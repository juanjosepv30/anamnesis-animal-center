<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recepción — Animal Center</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#faf7ff;--bg2:#f3eeff;--tx:#1a0a2e;--tm:#6b5c7e;--ts:#b0a4bf;
  --wh:#fff;--bd:#e8dff5;--p:#7c3aed;--pl:#f5f0ff;--pd:#5b21b6;--ok:#16a34a;
}
html,body{font-family:'DM Sans',system-ui,sans-serif;background:var(--bg);color:var(--tx);min-height:100vh}

.hdr{background:var(--wh);border-bottom:1px solid var(--bd);padding:0 22px;height:58px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.hdr-brand{display:flex;align-items:center;gap:10px}
.hdr-icon{width:34px;height:34px;border-radius:8px;overflow:hidden;background:var(--p);display:flex;align-items:center;justify-content:center}
.hdr-icon img{width:100%;height:100%;object-fit:cover}
.hdr-t{font-size:.95rem;font-weight:700}
.hdr-s{font-size:.72rem;color:var(--tm)}
.btn-ref{border:1.5px solid var(--bd);border-radius:8px;padding:6px 14px;color:var(--tm);font-size:.78rem;font-weight:600;cursor:pointer;background:var(--wh);font-family:'DM Sans',sans-serif}

.wrap{max-width:900px;margin:0 auto;padding:18px 16px 60px}
.card{background:var(--wh);border:1px solid var(--bd);border-radius:14px;padding:18px;margin-bottom:16px}
.card-t{font-size:.95rem;font-weight:700;margin-bottom:4px}
.card-sub{font-size:.8rem;color:var(--tm);margin-bottom:14px}

/* auto-fit y no 4 columnas fijas: en un celular no caben y empujaban la
   página entera hacia la derecha. min-width:0 porque un input trae ancho
   mínimo propio y se niega a achicarse aunque la columna sea chica. */
.search-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:8px}
.search-row input{border:1.5px solid var(--bd);border-radius:9px;padding:10px 12px;font-size:.87rem;font-family:'DM Sans',sans-serif;outline:none;background:var(--bg);min-width:0}
.search-row input:focus{border-color:var(--p);background:var(--wh)}
.search-row button{padding:10px 18px;border:none;border-radius:9px;background:var(--p);color:#fff;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;white-space:nowrap}
@media(max-width:640px){.search-row{grid-template-columns:1fr 1fr}.search-row button{grid-column:1/-1}}

.results{margin-top:12px;display:flex;flex-direction:column;gap:7px}
.res-item{border:1.5px solid var(--bd);border-radius:10px;padding:11px 13px;cursor:pointer;transition:all .15s}
.res-item:hover{border-color:var(--p);background:var(--pl)}
.res-name{font-weight:700;font-size:.9rem;display:flex;align-items:center;gap:7px;flex-wrap:wrap}
.res-hc{background:var(--p);color:#fff;border-radius:99px;padding:1px 8px;font-size:.62rem;font-weight:700}
.res-meta{font-size:.74rem;color:var(--tm);margin-top:2px}
.res-note{font-size:.8rem;color:var(--tm);text-align:center;padding:10px;background:var(--bg);border-radius:9px;margin-top:10px}
/* Botón "sin historia clínica" — siempre disponible bajo los resultados. */
.btn-nuevo{border:1.5px dashed var(--p);background:var(--pl);color:var(--pd);border-radius:9px;padding:9px 14px;font-size:.8rem;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;width:100%;margin-top:8px}
.btn-nuevo:hover{background:#ece4ff}
.res-ninguno{text-align:center;font-size:.78rem;color:var(--tm);margin-top:12px;padding-top:12px;border-top:1px solid var(--bd)}

.reg-form{background:var(--pl);border:1.5px solid #d8c9f5;border-radius:12px;padding:14px;margin-top:12px}
.reg-sel{font-weight:700;font-size:.9rem;margin-bottom:4px;display:flex;align-items:center;gap:7px}
/* Datos que vienen de Vetesoft: se muestran, no se editan. */
.reg-basic{font-size:.78rem;color:var(--tm);margin-bottom:12px}
/* Doctor fijo (viajero, rayos): dato, no selector. */
.reg-auto{font-size:.85rem;font-weight:600;padding:8px 10px;background:#f5f3ff;border-radius:7px;color:#5b21b6}
/* Grid de columnas FIJAS (no auto-fit): así las columnas de las dos rejillas
   —datos de mascota y servicio— quedan alineadas entre sí. Cada celda es una
   columna flex (label arriba, campo abajo). */
.reg-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px 14px;margin-bottom:14px}
.reg-grid>div{display:flex;flex-direction:column;min-width:0}
/* La clave de que todo se vea alineado: el label reserva SIEMPRE el alto de
   dos líneas y pega el texto abajo. Así un label de una línea y uno de dos
   dejan el input arrancando a la misma altura. */
.reg-grid label{font-size:.66rem;font-weight:700;text-transform:uppercase;letter-spacing:.4px;
  color:var(--tm);line-height:1.25;min-height:2.5em;display:flex;align-items:flex-end;margin-bottom:5px}
.lbl-tip{font-size:.62rem;font-weight:600;color:var(--ts);text-transform:none;letter-spacing:0;margin-left:4px}
/* Alto fijo para que selects e inputs midan exactamente igual. */
.reg-grid select,.reg-grid input{width:100%;box-sizing:border-box;height:40px;border:1.5px solid var(--bd);
  border-radius:8px;padding:0 10px;font-size:.85rem;font-family:'DM Sans',sans-serif;outline:none;background:var(--wh)}
.reg-grid select:focus,.reg-grid input:focus{border-color:var(--p)}
/* La hora, sola en su fila, no tiene que estirarse a lo ancho. */
#boxHora{max-width:200px}
@media(max-width:900px){.reg-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:560px){.reg-grid{grid-template-columns:1fr}.reg-grid label{min-height:0}}
.reg-actions{display:flex;gap:8px}
.btn-primary{flex:1;padding:11px;border:none;border-radius:9px;background:var(--p);color:#fff;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif}
.btn-primary.apagado,.btn-primary:disabled{background:var(--bd);color:var(--ts);cursor:not-allowed}
.btn-ghost{padding:11px 16px;border:1.5px solid var(--bd);border-radius:9px;background:var(--wh);color:var(--tm);font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif}

.confirm{background:#f0fdf4;border:1.5px solid #86efac;border-radius:12px;padding:16px;text-align:center;margin-top:12px}
.confirm .em{font-size:2rem}
.confirm .turno{font-size:2.2rem;font-weight:700;color:var(--pd);letter-spacing:1px;margin:4px 0}
.confirm .msg{font-size:.82rem;color:var(--tm)}

/* Waiting room list */
.wr-item{display:flex;align-items:stretch;gap:12px;border:1px solid var(--bd);border-radius:11px;padding:10px 13px;margin-bottom:7px;border-left:5px solid #94a3b8}
.wr-turno{font-size:1.05rem;font-weight:700;min-width:56px;font-variant-numeric:tabular-nums;display:flex;align-items:center}
.wr-info{flex:1;min-width:0;align-self:center}
.wr-name{font-weight:600;font-size:.9rem}
.wr-meta{font-size:.73rem;color:var(--tm);margin-top:1px}
/* Columna derecha: tiempos arriba, botones al medio, estado del registro
   abajo en la esquina. */
.wr-right{display:flex;flex-direction:column;align-items:flex-end;justify-content:space-between;gap:6px;text-align:right}
.wr-times{display:flex;flex-direction:column;align-items:flex-end;gap:1px}
.wr-cita{font-size:.78rem;font-weight:700;color:var(--tm);white-space:nowrap}
.wr-acts{display:flex;flex-direction:column;align-items:flex-end;gap:5px}
.wr-btn-reenviar{border-color:#a78bfa;color:#5b21b6;font-size:.68rem}
.badge{font-size:.62rem;font-weight:700;border-radius:99px;padding:2px 9px;white-space:nowrap}
.badge-ag{background:#ede9fe;color:#6d28d9}
.badge-esp{background:#eff6ff;color:#2563eb}
.badge-at{background:#f0fdf4;color:#16a34a}
.badge-au{background:#fef2f2;color:#dc2626}
/* Haciendo su registro en el celular. Ya está en la cola del médico; el
   color más suave es solo para que recepción vea que aún no terminó. */
.badge-llen{background:#ede9fe;color:#5b21b6}
.badge-ok{background:#f0fdf4;color:#16a34a}
.badge-sin{background:#f1f5f9;color:#64748b}
.wr-llenando{border-left-style:dashed!important;background:#faf9ff}
/* Tiempo de espera: neutro al principio, ámbar y rojo cuando se acumula. */
.wr-esp{font-size:.74rem;color:var(--tm);font-weight:700}
.wr-esp.esp-medio{color:#b45309}
.wr-esp.esp-mucho{color:#dc2626}
.wr-btn{border:1.5px solid var(--bd);border-radius:7px;padding:5px 10px;font-size:.72rem;font-weight:600;cursor:pointer;background:var(--wh);color:var(--tm);font-family:'DM Sans',sans-serif;white-space:nowrap}
/* Pestañas de la sala de espera. */
.wr-tabs{display:flex;gap:6px;margin:2px 0 12px;border-bottom:1.5px solid var(--bd)}
.wr-tab{border:none;background:none;padding:8px 12px;font-size:.82rem;font-weight:700;color:var(--tm);cursor:pointer;font-family:'DM Sans',sans-serif;border-bottom:2.5px solid transparent;margin-bottom:-1.5px;display:flex;align-items:center;gap:6px}
.wr-tab.active{color:var(--p);border-bottom-color:var(--p)}
.wr-tabn{font-size:.7rem;background:var(--bg);color:var(--tm);border-radius:10px;padding:1px 7px;font-weight:700}
.wr-tab.active .wr-tabn{background:var(--pl);color:var(--p)}
/* Subtítulo de grupo dentro de "En espera". */
.wr-grp{font-size:.7rem;font-weight:800;text-transform:uppercase;letter-spacing:.4px;color:var(--ts);margin:12px 0 6px}
.wr-grp:first-child{margin-top:0}
.wr-btn-volver{border-color:#a78bfa;color:#5b21b6}
.empty{text-align:center;padding:40px 20px;color:var(--tm);font-size:.85rem}
.spinner{width:30px;height:30px;border:2.5px solid var(--bd);border-top-color:var(--p);border-radius:50%;animation:spin .7s linear infinite;margin:30px auto}
@keyframes spin{to{transform:rotate(360deg)}}
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:var(--tx);color:#fff;border-radius:10px;padding:10px 20px;font-size:.82rem;font-weight:600;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}
</style>
</head>
<body>

<div id="app">
  <header class="hdr">
    <div class="hdr-brand">
      <div class="hdr-icon" id="hdrIcon"><img src="/img/paw.jpg" alt="" onerror="this.remove();document.getElementById('hdrIcon').textContent='🐾'"></div>
      <div><div class="hdr-t">Recepción</div><div class="hdr-s" id="hdrSub">Sala de espera</div></div>
    </div>
    <button class="btn-ref" onclick="loadWaitingRoom()">↻ Actualizar</button>
  </header>

  <div class="wrap">
    <div class="card">
      <div class="card-t">Registrar llegada</div>
      <div class="card-sub">Busca al paciente en Vetesoft, valida contra el calendar y regístralo en la sala. Sirve para los que tienen cita y para los que no.</div>
      <div class="search-row">
        <!-- La cédula va primera y con el foco: es única, así que encuentra
             mejor que los nombres (que se repiten). Enter en cualquier campo
             dispara la búsqueda, para no tener que ir hasta el botón. -->
        <input type="number" id="qCedula" placeholder="Cédula" autofocus onkeydown="if(event.key==='Enter')doSearch()">
        <input type="text" id="qOwner" placeholder="Nombre del dueño (opcional)" onkeydown="if(event.key==='Enter')doSearch()">
        <input type="text" id="qPet" placeholder="Nombre de la mascota (opcional)" onkeydown="if(event.key==='Enter')doSearch()">
        <button onclick="doSearch()">🔍 Buscar</button>
      </div>
      <div class="results" id="results"></div>
      <div id="regArea"></div>
    </div>

    <div class="card">
      <div class="card-t">Sala de espera · hoy</div>
      <div class="wr-tabs">
        <button class="wr-tab active" data-tab="espera"    onclick="verTab('espera')">En espera <span class="wr-tabn" id="cEspera">0</span></button>
        <button class="wr-tab"        data-tab="ausentes"  onclick="verTab('ausentes')">Ausentes <span class="wr-tabn" id="cAusentes">0</span></button>
        <button class="wr-tab"        data-tab="atendidos" onclick="verTab('atendidos')">Atendidos <span class="wr-tabn" id="cAtendidos">0</span></button>
      </div>
      <div id="wrList"><div class="spinner"></div></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API_URL = 'https://script.google.com/macros/s/AKfycbx61iNPH-W-UJLzDX4rC1_NJckbQb-ZVlkzuY27cZRRBbVwsae9QAAJvfysla7e_DSU/exec';
let selected = null;

// Las 13 especialidades con su médico.
const SPECIALTIES = [
  {name:'Cardiología',       doctor:'Dr. Wilmer Páez'},
  {name:'Dermatología',      doctor:'Dra. Marisol Villamizar'},
  {name:'Medicina Felina',   doctor:'Dra. Estefanía Tenorio'},
  {name:'Gastroenterología', doctor:'Dra. Tatiana Rodríguez'},
  {name:'Endocrinología',    doctor:'Dra. Catherine Hernández'},
  {name:'Neonatología',      doctor:'Dra. Catherine Hernández'},
  {name:'Nutrición',         doctor:'Dr. Freddy Vera'},
  {name:'Oftalmología',      doctor:'Dr. Alberto Amaya'},
  {name:'Imagenología',      doctor:'Dra. Angie Valero'},
  {name:'Terapia Física',    doctor:'Dra. Milena Rodríguez'},
  {name:'Nefrología',        doctor:'Dr. Wilmer Rodríguez'},
  {name:'Ortopedia',         doctor:'Dr. Wilmer Páez'},
  {name:'Oncología',         doctor:'Dr. Jhoiner Barbosa'}
];

function buildSpecOptions() {
  var h = '<option value="">— Elegí especialidad —</option>';
  SPECIALTIES.forEach(function(s){
    h += '<option value="'+s.name+'">'+s.name+' — '+s.doctor+'</option>';
  });
  return h;
}

// ── El servicio manda ────────────────────────────────────────
// Una sola tabla decide, por servicio, si recepción elige doctor y si hay
// agenda. Es la regla del dueño hecha config: agregar o cambiar un servicio
// es tocar acá, no repartir "if (servicio === ...)" por todo el archivo.
//   doctor 'elige'  → recepción selecciona especialista, y puede agendar
//   doctor 'auto'   → un solo doctor fijo (viajero→Freddy, rayos→Angie)
//   doctor 'ninguno'→ por orden de llegada, sin especialista
var SERVICIOS = [
  { v:'Consulta especializada', doctor:'elige',   agenda:true  },
  { v:'Control especializado',  doctor:'elige',   agenda:true  },
  { v:'Consulta general',       doctor:'ninguno', agenda:false },
  { v:'Control general',        doctor:'ninguno', agenda:false },
  { v:'Vacunación',             doctor:'ninguno', agenda:false },
  { v:'Inyectología',           doctor:'ninguno', agenda:false },
  { v:'Viajero',                doctor:'auto', fijo:'Dr. Freddy Vera',   agenda:false, label:'Viajero / certificado' },
  { v:'Rayos X y Ecografía',    doctor:'auto', fijo:'Dra. Angie Valero', agenda:false }
];

function servicioCfg(v) {
  for (var i = 0; i < SERVICIOS.length; i++) if (SERVICIOS[i].v === v) return SERVICIOS[i];
  return SERVICIOS[0];
}

function buildServiceOptions() {
  // Arranca sin servicio elegido: recepción tiene que elegir a conciencia,
  // no aceptar un default. Hasta que elija, el botón Registrar está apagado.
  return '<option value="">— Elegí el servicio —</option>' +
    SERVICIOS.map(function(s){
      return '<option value="'+s.v+'">'+(s.label || s.v)+'</option>';
    }).join('');
}

// Horas de cita: solo en punto y y-media (06:00 → 22:00).
function buildHoraOptions(sel) {
  var h = '';
  for (var m = 6*60; m <= 22*60; m += 30) {
    var hh = String(Math.floor(m/60)).padStart(2,'0');
    var mm = String(m%60).padStart(2,'0');
    var v = hh + ':' + mm;
    h += '<option value="'+v+'"'+(v===sel?' selected':'')+'>'+v+'</option>';
  }
  return h;
}

// Tolerancia de una cita: manda hasta 15 min después de su hora. Pasado
// eso, el que llegó sin cita pasa. Tiene que coincidir con TOLERANCIA_CITA
// del dashboard.
var TOLERANCIA_CITA = 15;

function sumarMinutos(hhmm, mins) {
  var p = String(hhmm || '').split(':');
  if (p.length !== 2) return '';
  var t = parseInt(p[0],10)*60 + parseInt(p[1],10) + mins;
  return String(Math.floor(t/60)).padStart(2,'0') + ':' + String(t%60).padStart(2,'0');
}

// ¿Este servicio se agenda? Ojo: NO es lo mismo que "lo atiende un
// especialista". Rayos X los hace la Dra. Angie y los viajeros el Dr.
// Freddy —los dos son especialistas— pero esos servicios no se reservan
// por hora: el cliente llega y se atiende. Por eso esta función NO es
// espejo de recordFila, que responde otra pregunta (a qué cola va).
// El servicio decide todo: quién es el doctor y si hay agenda. Antes esto
// miraba el texto del servicio con indexOf; ahora lee la config, que es la
// única fuente de verdad (ver SERVICIOS).
function pintarServicio() {
  var svc = document.getElementById('regService').value;

  // Sin servicio elegido no se muestra nada más ni se puede registrar: hay
  // que elegir primero. Esconde doctor y agenda, y apaga el botón.
  if (!svc) {
    ['boxSpec','boxAutoDoc','boxTieneCita','boxHora','boxEsperar'].forEach(function(id){
      document.getElementById(id).style.display = 'none';
    });
    document.getElementById('regSpec').value = '';
    document.querySelector('.btn-primary').textContent = 'Registrar llegada →';
    actualizarBotonRegistro();
    return;
  }

  var cfg = servicioCfg(svc);

  // ── Doctor ──
  // 'elige' → selector de especialista visible.
  // 'auto'  → un solo doctor, no se elige: se muestra como dato.
  // 'ninguno' → no aparece nada.
  document.getElementById('boxSpec').style.display    = cfg.doctor === 'elige' ? '' : 'none';
  document.getElementById('boxAutoDoc').style.display = cfg.doctor === 'auto'  ? '' : 'none';
  if (cfg.doctor === 'auto') {
    document.getElementById('autoDocName').textContent = cfg.fijo;
  }
  if (cfg.doctor !== 'elige') document.getElementById('regSpec').value = '';

  // ── Agenda ──
  // Solo los servicios con agenda preguntan por cita. El resto entra por
  // orden de llegada: preguntar "¿tiene cita?" ahí es hacer pensar de más.
  document.getElementById('boxTieneCita').style.display = cfg.agenda ? '' : 'none';
  if (!cfg.agenda) {
    document.getElementById('regAgendado').value = 'no';
    document.getElementById('regEsperar').value  = '';
  }

  var conCita = cfg.agenda && document.getElementById('regAgendado').value === 'si';
  document.getElementById('boxHora').style.display    = conCita ? '' : 'none';
  document.getElementById('boxEsperar').style.display = (cfg.agenda && !conCita) ? '' : 'none';
  document.querySelector('.btn-primary').textContent  = conCita
    ? 'Registrar como agendado →'
    : 'Registrar llegada →';
  if (conCita) document.getElementById('regEsperar').value = '';
  pintarDescongela();
  actualizarBotonRegistro();
}

// Apaga el botón Registrar hasta que el formulario esté completo: hay que
// elegir servicio, y si el servicio pide especialista, también elegirlo.
// Así no se registra a medias.
function actualizarBotonRegistro() {
  var svc = document.getElementById('regService').value;
  var cfg = svc ? servicioCfg(svc) : null;
  var falta = !svc || (cfg && cfg.doctor === 'elige' && !document.getElementById('regSpec').value);
  var btn = document.querySelector('.btn-primary');
  if (btn) { btn.disabled = !!falta; btn.classList.toggle('apagado', !!falta); }
}

// Le mostramos a recepción a qué hora se descongela, para que pueda
// decírselo al cliente: "si no llega a las 3:15, usted pasa".
function pintarDescongela() {
  var cita = document.getElementById('regEsperar').value;
  var el = document.getElementById('descongela');
  el.textContent = cita
    ? '→ Si no llega, pasa a las ' + sumarMinutos(cita, TOLERANCIA_CITA)
    : '';
}

// Media hora más cercana a la hora actual.
function nearestHalfHour() {
  var n = new Date();
  var m = n.getHours()*60 + n.getMinutes();
  var r = Math.round(m/30)*30;
  if (r < 6*60) r = 6*60;
  if (r > 22*60) r = 22*60;
  return String(Math.floor(r/60)).padStart(2,'0') + ':' + String(r%60).padStart(2,'0');
}

// Arranca directo, sin PIN.
function iniciar() {
  loadWaitingRoom();
  // Se refresca sola, pero se pausa si recepción está registrando a alguien.
  setInterval(function(){ if (!selected) loadWaitingRoom(true); }, 60000);
}

function esc(s){ if(!s)return''; return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// La hora de cita se guarda "HH:MM" pero Sheets la devuelve como un
// timestamp 1899 (1899-12-30T...). Lo pasamos a "HH:MM", igual que el
// dashboard, para que recepción no vea el timestamp crudo.
function fmtHora(h){
  if(!h) return '';
  if(typeof h==='string' && /^\d{1,2}:\d{2}$/.test(h)) return h;
  var d=new Date(h);
  if(!isNaN(d)) return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');
  return String(h);
}

// Cuánto lleva esperando el cliente, desde que llegó. Es el dato operativo
// de recepción: no la hora de la cita (esa es 🕐), sino el tiempo que ya
// acumuló en sala. Igual que el dashboard del médico.
function minsEsperando(ts){ var d=new Date(ts); return isNaN(d)?null:Math.floor((Date.now()-d.getTime())/60000); }
function fmtEspera(ts){
  var m=minsEsperando(ts); if(m===null) return '';
  if(m<1) return 'recién llegó';
  if(m<60) return 'hace '+m+' min';
  var h=Math.floor(m/60), r=m%60;
  return 'hace '+h+' h'+(r?' '+r+' min':'');
}
function claseEspera(ts){ var m=minsEsperando(ts); if(m===null)return''; if(m>=45)return' esp-mucho'; if(m>=30)return' esp-medio'; return''; }

// Estado del registro, para que recepción sepa de un vistazo si la ficha
// está lista. Mismo criterio que ve el médico.
function etiquetaReg(r){
  if(r.estadoTurno==='llenando') return '<span class="badge badge-llen">Haciendo registro</span>';
  if(r.complaint || r.detail)    return '<span class="badge badge-ok">Registro listo</span>';
  return '<span class="badge badge-sin">Sin registro</span>';
}

function serviceColor(s){
  s=(s||'').toLowerCase();
  // Control primero: "Control especializado" tiene las dos palabras, y como
  // control se agrupa (azul) con los demás controles, no con la naranja.
  if(s.indexOf('control')!==-1)return'#2563eb';
  if(s.indexOf('especial')!==-1)return'#f97316';
  if(s.indexOf('vacun')!==-1)return'#8e3f9e';
  if(s.indexOf('inyect')!==-1)return'#eab308';
  if(s.indexOf('general')!==-1)return'#16a34a';
  return'#94a3b8';
}

// ── Búsqueda en Vetesoft ─────────────────────────────────────
function doSearch() {
  const owner = document.getElementById('qOwner').value.trim();
  const pet   = document.getElementById('qPet').value.trim();
  const ced   = document.getElementById('qCedula').value.trim();
  if (!owner && !pet && !ced) { showToast('Ingresá al menos un dato'); return; }
  document.getElementById('regArea').innerHTML = '';
  document.getElementById('results').innerHTML = '<div class="spinner"></div>';
  const url = API_URL + '?action=search&petName=' + encodeURIComponent(pet) +
              '&ownerName=' + encodeURIComponent(owner) + '&cedula=' + encodeURIComponent(ced);
  fetch(url).then(r=>r.json()).then(function(res){
    // El botón "sin historia clínica" va SIEMPRE — con o sin coincidencias.
    // Si la búsqueda no encontró nada, es la única salida. Y si encontró
    // parecidos pero ninguno es el cliente, también hay que poder registrar
    // uno nuevo, o recepción se queda trabada mirando homónimos.
    var btnNuevo = '<button class="btn-nuevo" onclick="registrarNuevo()">+ No tiene historia clínica — registrar nuevo</button>';

    if (!res || !res.ok || !res.results || !res.results.length) {
      document.getElementById('results').innerHTML =
        '<div class="res-note">No se encontró en Vetesoft.</div>' + btnNuevo;
      return;
    }
    let html = '';
    res.results.forEach(function(r, i){
      window['_r'+i] = r;
      const hc = r.registro ? '<span class="res-hc">HC '+esc(r.registro)+'</span>' : '';
      html += '<div class="res-item" onclick="pickResult(_r'+i+')"><div class="res-name">'+esc(r.petName||'')+hc+'</div>'+
              '<div class="res-meta">'+esc(r.species||'')+(r.breed?' · '+esc(r.breed):'')+' | 👤 '+esc(r.owner||'')+(r.documento?' · CC '+esc(r.documento):'')+'</div></div>';
    });
    // Al final de la lista: por si ninguno de los que aparecen es el cliente.
    html += '<div class="res-ninguno">¿Ninguno es? ' + btnNuevo + '</div>';
    document.getElementById('results').innerHTML = html;
  }).catch(function(){
    document.getElementById('results').innerHTML = '<div class="res-note">Error de conexión con Vetesoft.</div>';
  });
}

// Vetesoft nos devuelve el teléfono del propietario, pero puede ser un
// fijo, un número viejo o el del vecino. Solo proponemos lo que parece un
// celular colombiano; lo demás lo escribe recepción mirando al cliente.
// Un dato prellenado que nadie mira es peor que un campo vacío: el vacío
// al menos obliga a preguntar.
function telSugerido(t) {
  var d = String(t || '').replace(/[^0-9]/g, '');
  if (d.length === 12 && d.indexOf('57') === 0) d = d.slice(2);
  return (d.length === 10 && d.charAt(0) === '3') ? d : '';
}

// ── Cliente encontrado en Vetesoft ──
function pickResult(r) { abrirRegistro(r, false); }

// ── Cliente nuevo, sin historia clínica ──
// Arranca del dato que recepción ya tecleó en la búsqueda. La mascota se
// carga a mano acá porque no hay de dónde sacarla — es la única diferencia
// con el que tiene HC.
function registrarNuevo() {
  abrirRegistro({
    id:'', registro:'', esNuevo:true,
    petName: document.getElementById('qPet').value.trim(),
    owner:   document.getElementById('qOwner').value.trim(),
    documento: document.getElementById('qCedula').value.trim(),
    species:'', breed:'', sex:'', age:'', phone:''
  }, true);
}

// ── Formulario de registro (los dos caminos comparten este) ──
function abrirRegistro(r, esNuevo) {
  selected = r;
  document.getElementById('results').innerHTML = '';
  var hh = nearestHalfHour();

  // Datos de la mascota: si tiene HC vienen de Vetesoft y solo se muestran;
  // si es nuevo, recepción los carga (con la mascota enfrente el dato sale
  // bien). La edad de Vetesoft ya viene calculada de la fecha de nacimiento.
  var cabecera = esNuevo
    ? '<div class="reg-grid">'+
        '<div><label>Nombre del dueño</label><input id="regOwner" type="text" value="'+esc(r.owner)+'"></div>'+
        '<div><label>Cédula <span class="lbl-tip">(opcional)</span></label><input id="regCed" type="text" inputmode="numeric" value="'+esc(r.documento)+'"></div>'+
        '<div><label>Nombre de la mascota</label><input id="regPet" type="text" value="'+esc(r.petName)+'"></div>'+
        '<div><label>Especie</label><select id="regSpecies"><option value="Canino">Perro</option><option value="Felino">Gato</option></select></div>'+
        '<div><label>Raza <span class="lbl-tip">(opcional)</span></label><input id="regBreed" type="text" placeholder="Ej: Mestizo"></div>'+
        '<div><label>Sexo</label><select id="regSex"><option value="Macho">Macho</option><option value="Hembra">Hembra</option></select></div>'+
        '<div><label>Edad <span class="lbl-tip">(opcional)</span></label><input id="regAge" type="text" placeholder="Ej: 3 años"></div>'+
      '</div>'
    : '<div class="reg-sel">✅ '+esc(r.petName)+' — '+esc(r.owner)+(r.registro?' · HC '+esc(r.registro):'')+'</div>'+
      '<div class="reg-basic">'+esc(r.species||'')+(r.breed?' · '+esc(r.breed):'')+
        (r.sex?' · '+esc(r.sex):'')+(r.age?' · '+esc(r.age):'')+'</div>';

  document.getElementById('regArea').innerHTML =
    '<div class="reg-form">'+
      cabecera+
      '<div class="reg-grid">'+
        '<div><label>Servicio</label><select id="regService" onchange="pintarServicio()">'+buildServiceOptions()+'</select></div>'+
        // El selector de especialista solo aparece para los servicios que lo
        // eligen (ver SERVICIOS). pintarServicio() lo muestra o lo esconde.
        '<div id="boxSpec"><label>Especialidad / Doctor</label><select id="regSpec" onchange="actualizarBotonRegistro()">'+buildSpecOptions()+'</select></div>'+
        // Viajero y Rayos van con un doctor fijo: se muestra, no se elige.
        '<div id="boxAutoDoc" style="display:none"><label>Doctor asignado</label><div class="reg-auto">👨‍⚕️ <span id="autoDocName"></span></div></div>'+
        // Con teléfono, al cliente le llega el link y llena la ficha desde su
        // celular. Vacío, recepción se la llena a mano. Señores de 78,
        // celulares sin datos, gente que no quiere — ese camino no se toca.
        '<div><label>WhatsApp <span class="lbl-tip">(vacío = sin mensaje)</span></label>'+
          '<input id="regTel" type="tel" inputmode="numeric" maxlength="10" placeholder="3001234567" value="'+esc(telSugerido(r.phone))+'"></div>'+
        '<div id="boxTieneCita"><label>¿Tiene cita?</label><select id="regAgendado" onchange="pintarServicio()">'+
          '<option value="si">Sí, está en la agenda</option>'+
          '<option value="no">No, el doctor aceptó atenderlo</option>'+
        '</select></div>'+
        '<div id="boxHora"><label>Hora de su cita</label><select id="regHora">'+buildHoraOptions(hh)+'</select></div>'+
        // Sin cita: se pone la hora de la cita que hay antes —lo que se ve en
        // el calendario— y el sistema le suma los 15 min. Pedirle que calcule
        // "3:00 + 15" es pedirle que se equivoque a las 6 de la tarde.
        '<div id="boxEsperar" style="display:none"><label>¿Hay una cita antes? <span class="lbl-tip">(hora de esa cita)</span></label>'+
          '<select id="regEsperar" onchange="pintarDescongela()">'+
          '<option value="">— No, puede pasar cuando le toque —</option>'+
          buildHoraOptions('')+'</select>'+
          '<div class="lbl-tip" id="descongela"></div></div>'+
      '</div>'+
      '<div class="reg-actions">'+
        '<button class="btn-primary" onclick="doRegister()">Registrar llegada →</button>'+
        '<button class="btn-ghost" onclick="cancelReg()">Cancelar</button>'+
      '</div>'+
    '</div>';
  // Dejamos los campos coherentes de entrada, no solo cuando alguien toca algo.
  pintarServicio();
}

function cancelReg(){ selected=null; document.getElementById('regArea').innerHTML=''; }

// ── Registrar llegada ────────────────────────────────────────
function doRegister() {
  if (!selected) return;
  var esNuevo = !!selected.esNuevo;
  var service = document.getElementById('regService').value;
  var cfg = servicioCfg(service);

  // El servicio que elige especialista no se puede registrar sin uno:
  // sería una consulta especializada sin doctor, que no rutea a nadie.
  var specialty = cfg.doctor === 'elige' ? document.getElementById('regSpec').value.trim() : '';
  if (cfg.doctor === 'elige' && !specialty) {
    showToast('Elegí la especialidad / doctor');
    return;
  }

  // Los datos de la mascota: del formulario si es nuevo, de Vetesoft si tiene
  // HC. Recepción es dueña de esto (ver la regla en el backend).
  var mascota = esNuevo ? {
    petName: document.getElementById('regPet').value.trim(),
    owner:   document.getElementById('regOwner').value.trim(),
    documento: document.getElementById('regCed').value.trim(),
    species: document.getElementById('regSpecies').value,
    breed:   document.getElementById('regBreed').value.trim(),
    sex:     document.getElementById('regSex').value,
    age:     document.getElementById('regAge').value.trim()
  } : {
    petName: selected.petName || '', owner: selected.owner || '',
    documento: selected.documento || '', species: selected.species || '',
    breed: selected.breed || '', sex: selected.sex || '', age: selected.age || ''
  };
  if (esNuevo && (!mascota.petName || !mascota.owner)) {
    showToast('Falta el nombre del dueño y de la mascota');
    return;
  }

  const payload = {
    action: 'registerArrival',
    data: {
      vetesoftId: selected.id ? String(selected.id) : '',
      vetesoftHc: selected.registro || '',
      petName: mascota.petName,
      species: mascota.species,
      breed: mascota.breed,
      sex: mascota.sex,
      age: mascota.age,
      owner: mascota.owner,
      service: service,
      specialty: specialty,
      agendado: document.getElementById('regAgendado').value,
      // La hora de cita solo viaja si de verdad tiene cita: si no, le
      // estaríamos dando prioridad de agendado a alguien que llegó sin ella.
      horaCita: document.getElementById('regAgendado').value === 'si'
        ? document.getElementById('regHora').value : '',
      // Guardamos la hora YA sumada: el dashboard solo compara contra el
      // reloj, no tiene que saber de tolerancias.
      esperarHasta: (function(){
        if (document.getElementById('regAgendado').value === 'si') return '';
        var c = document.getElementById('regEsperar').value;
        return c ? sumarMinutos(c, TOLERANCIA_CITA) : '';
      })(),
      // Si va vacío, el backend no manda nada y el paciente entra directo
      // a la fila, como toda la vida.
      phone: document.getElementById('regTel').value.trim()
    }
  };
  document.getElementById('regArea').innerHTML = '<div class="spinner"></div>';
  fetch(API_URL, { method:'POST', body: JSON.stringify(payload) })
    .then(r=>r.json()).then(function(res){
      if (res && res.ok) {
        // Lo que ve recepción tiene que ser lo que de verdad pasó. Si el
        // saludo no salió, la recepcionista está por mandar al cliente a
        // esperar un mensaje que nunca va a llegar — y eso hay que decirlo
        // ahora, con el cliente todavía enfrente del mostrador.
        var msg, em = '🎫';
        if (res.esperaFicha) {
          msg = 'Le llegó el link por WhatsApp 📲 Que llene la ficha desde el celular. ' +
                'El médico ya lo ve en la cola; si no la llena, lo atiende igual.';
        } else if (res.telIntentado) {
          // El WhatsApp falló pero el paciente entró a la fila igual: sin
          // este aviso todo "se ve bien" y el número malo sigue ahí.
          em  = '⚠️';
          msg = 'NO se pudo mandar el WhatsApp — revisá el número. ' +
                'Igual quedó en la sala de espera y el médico ya lo ve, como siempre.';
        } else {
          msg = 'Registrado en la sala de espera' +
                (res.linked ? ' y enlazado con su anamnesis' : '') + '. El médico ya lo ve.';
        }
        document.getElementById('regArea').innerHTML =
          '<div class="confirm"><div class="em">'+em+'</div>'+
          '<div class="turno">'+esc(res.turno)+'</div>'+
          '<div class="msg">'+msg+'</div></div>';
        document.getElementById('qOwner').value=''; document.getElementById('qPet').value=''; document.getElementById('qCedula').value='';
        selected = null;
        loadWaitingRoom(true);
        setTimeout(function(){ document.getElementById('regArea').innerHTML=''; }, 6000);
      } else {
        document.getElementById('regArea').innerHTML = '<div class="res-note">Error al registrar. Intentá de nuevo.</div>';
      }
    }).catch(function(){
      document.getElementById('regArea').innerHTML = '<div class="res-note">Error de conexión.</div>';
    });
}

// ── Sala de espera de hoy (con pestañas) ─────────────────────
// Tres solapas, para que recepción no pierda de vista nada:
//   En espera  → los que están en la cola (esperando/llamando/llenando),
//                separados en especialidades y generales, como los médicos.
//   Ausentes   → los que se fueron (o el médico no vio). Dato útil: cuántos
//                se van por la espera. Desde acá se devuelven a la fila.
//   Atendidos  → los que ya pasaron. Solo lectura.
var wrRecords = [];
var wrTab = 'espera';

function verTab(t) {
  wrTab = t;
  var tabs = document.querySelectorAll('.wr-tab');
  for (var i = 0; i < tabs.length; i++) tabs[i].classList.toggle('active', tabs[i].getAttribute('data-tab') === t);
  renderTab();
}

// Especializado = va a un doctor puntual (especialista, viajero→Fredy,
// rayos→Angie, o control con especialista). El resto, general. Mismo
// criterio con el que los médicos separan sus dos filas.
function esEspecializado(r) {
  var s = String(r.service || '').toLowerCase();
  if (s.indexOf('especial') !== -1) return true;
  if (s.indexOf('control') !== -1 && r.specialty) return true;
  if (s.indexOf('viajer') !== -1 || s.indexOf('rayos') !== -1 || s.indexOf('ecograf') !== -1) return true;
  return false;
}

function loadWaitingRoom(silent) {
  if (!silent) document.getElementById('wrList').innerHTML = '<div class="spinner"></div>';
  fetch(API_URL + '?action=records').then(r=>r.json()).then(function(res){
    if (!res || !res.ok) { document.getElementById('wrList').innerHTML = '<div class="empty">Error al cargar.</div>'; return; }
    var today = new Date();
    wrRecords = (res.records || []).filter(function(r){
      var d = new Date(r.timestamp);
      return !isNaN(d) && d.toDateString() === today.toDateString();
    });
    renderTab();
  }).catch(function(){ document.getElementById('wrList').innerHTML = '<div class="empty">Error de conexión.</div>'; });
}

// Una fila de la lista. `acts` es el HTML de los botones de acción (o '').
function wrItem(r, acts) {
  var color = serviceColor(r.service);
  // Un solo badge: si lo están llamando, eso manda; si no, el estado del
  // registro. Se quitó "Agendado" — en esta pantalla no aporta.
  var badge = r.estadoTurno === 'llamando'
    ? '<span class="badge badge-esp">Llamando</span>'
    : etiquetaReg(r);
  // Bloque de tiempos, arriba a la derecha: la hora de la cita (si tiene)
  // arriba, y cuánto lleva esperando debajo — son cosas distintas, por eso
  // separadas. La espera solo para los que siguen en la cola.
  var enCola = (!r.estadoTurno || r.estadoTurno==='esperando' || r.estadoTurno==='llenando' || r.estadoTurno==='llamando');
  var times = '';
  if (r.horaCita) times += '<div class="wr-cita">Cita '+esc(fmtHora(r.horaCita))+'</div>';
  if (enCola)     times += '<div class="wr-esp'+claseEspera(r.timestamp)+'">'+esc(fmtEspera(r.timestamp))+'</div>';
  return '<div class="wr-item'+(r.estadoTurno==='llenando'?' wr-llenando':'')+'" style="border-left-color:'+color+'">'+
    '<div class="wr-turno" style="color:'+color+'">'+esc(r.turno||'—')+'</div>'+
    '<div class="wr-info"><div class="wr-name">'+esc(r.petName||'Sin nombre')+'</div>'+
      '<div class="wr-meta">👤 '+esc(r.ownerName||'—')+' · '+esc(r.service||'')+(r.consultorio?' · Cons. '+esc(r.consultorio):'')+'</div></div>'+
    '<div class="wr-right">'+
      (times ? '<div class="wr-times">'+times+'</div>' : '<div></div>')+
      (acts  ? '<div class="wr-acts">'+acts+'</div>'  : '')+
      '<div class="wr-badge">'+badge+'</div>'+
    '</div>'+
  '</div>';
}

// Un grupo con subtítulo (Especialidades / Generales), del que más espera
// al que menos.
function wrGrupo(titulo, arr) {
  if (!arr.length) return '';
  arr.sort(function(a,b){ return new Date(a.timestamp) - new Date(b.timestamp); });
  var h = '<div class="wr-grp">'+titulo+' · '+arr.length+'</div>';
  arr.forEach(function(r){
    var acts = '<button class="wr-btn" onclick="markAusente('+r.rowIndex+',\'ausente\')">Ausente</button>';
    // Reenviar el link SOLO si tiene teléfono cargado y todavía no completó
    // el registro (y no lo están llamando). Es el caso raro de que el primer
    // mensaje no le llegó.
    if (r.ownerPhone && !(r.complaint || r.detail) && r.estadoTurno !== 'llamando') {
      acts += '<button class="wr-btn wr-btn-reenviar" onclick="reenviarReg('+r.rowIndex+')">↻ Reenviar registro</button>';
    }
    h += wrItem(r, acts);
  });
  return h;
}

function renderTab() {
  var espera    = wrRecords.filter(function(r){ var e=r.estadoTurno||'esperando'; return e==='esperando'||e==='llamando'||e==='llenando'; });
  var ausentes  = wrRecords.filter(function(r){ return r.estadoTurno==='ausente'; });
  var atendidos = wrRecords.filter(function(r){ return r.estadoTurno==='atendido'; });

  document.getElementById('cEspera').textContent    = espera.length;
  document.getElementById('cAusentes').textContent  = ausentes.length;
  document.getElementById('cAtendidos').textContent = atendidos.length;

  var el = document.getElementById('wrList');
  var html = '';

  if (wrTab === 'espera') {
    if (!espera.length) { el.innerHTML = '<div class="empty">Nadie en espera todavía.</div>'; return; }
    html += wrGrupo('🩺 Especialidades', espera.filter(esEspecializado));
    html += wrGrupo('🐾 Generales',      espera.filter(function(r){ return !esEspecializado(r); }));

  } else if (wrTab === 'ausentes') {
    if (!ausentes.length) { el.innerHTML = '<div class="empty">Ningún ausente hoy.</div>'; return; }
    ausentes.sort(function(a,b){ return new Date(a.timestamp) - new Date(b.timestamp); });
    ausentes.forEach(function(r){
      // Devolver a la fila conserva su hora de llegada → vuelve de primero.
      html += wrItem(r, '<button class="wr-btn wr-btn-volver" onclick="markAusente('+r.rowIndex+',\'esperando\')">← Devolver a la fila</button>');
    });

  } else { // atendidos
    if (!atendidos.length) { el.innerHTML = '<div class="empty">Nadie atendido todavía.</div>'; return; }
    atendidos.sort(function(a,b){ return new Date(b.timestamp) - new Date(a.timestamp); });
    atendidos.forEach(function(r){ html += wrItem(r, ''); });
  }
  el.innerHTML = html;
}

function markAusente(rowIndex, estado) {
  fetch(API_URL, { method:'POST', body: JSON.stringify({ action:'updateTurno', rowIndex: rowIndex, estado: estado }) })
    .then(r=>r.json()).then(function(res){
      if (res && res.ok) { showToast(estado==='ausente'?'Marcado ausente':'Devuelto a la fila'); loadWaitingRoom(true); }
      else { showToast((res && res.error) || 'Error al actualizar'); loadWaitingRoom(true); }
    }).catch(function(){ showToast('Error de conexión'); });
}

// Reenvía el link del registro. El backend se niega si ya lo completó o no
// tiene teléfono, y muestra el motivo tal cual. El guard `reenviando` evita
// el doble toque en un celular lento.
var reenviando = {};
function reenviarReg(rowIndex) {
  if (reenviando[rowIndex]) return;
  reenviando[rowIndex] = true;
  setTimeout(function(){ delete reenviando[rowIndex]; }, 8000);
  fetch(API_URL, { method:'POST', body: JSON.stringify({ action:'reenviarRegistro', rowIndex: rowIndex }) })
    .then(r=>r.json()).then(function(res){
      if (res && res.ok) { showToast('Link reenviado 📲'); loadWaitingRoom(true); }
      else { showToast((res && res.error) || 'No se pudo reenviar'); loadWaitingRoom(true); }
    }).catch(function(){ showToast('Error de conexión'); });
}

function showToast(msg){
  const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2500);
}

iniciar();
