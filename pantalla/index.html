<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sala de espera — Animal Center</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f3e7f7;--wh:#fff;--tx:#3a2140;--tm:#7d6d86;--ts:#b8a8c2;
  --p:#8e3f9e;--bd:#e8daf0;
}
html,body{height:100%;font-family:'Nunito',sans-serif;background:var(--bg);color:var(--tx);overflow:hidden}
body{display:flex;flex-direction:column}

/* Encabezado */
.hdr{background:var(--wh);border-bottom:3px solid var(--bd);padding:14px 34px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.hdr-l{display:flex;align-items:center;gap:16px}
.hdr-logo{height:52px;object-fit:contain}
.hdr-t{font-size:1.5rem;font-weight:900;color:var(--p)}
.clock{font-size:2rem;font-weight:900;color:var(--tx);font-variant-numeric:tabular-nums}

/* Zona principal */
.main{flex:1;display:flex;gap:22px;padding:22px 34px;min-height:0}
.calling-zone{flex:3;display:flex;flex-direction:column;min-width:0}
.side{flex:1;display:flex;flex-direction:column;min-width:260px}
.zone-t{font-size:1.05rem;font-weight:900;text-transform:uppercase;letter-spacing:2px;color:var(--tm);margin-bottom:14px;flex-shrink:0}

.cards{flex:1;display:flex;flex-direction:column;gap:18px;overflow:hidden;align-content:start}
.card{background:var(--wh);border-radius:24px;padding:30px 36px;border-left:18px solid var(--p);box-shadow:0 8px 30px rgba(58,33,64,.10);display:flex;align-items:center;justify-content:space-between;gap:20px;flex-shrink:0}
.card.nuevo{animation:pop 1.6s ease-in-out 3}
@keyframes pop{0%,100%{transform:scale(1)}50%{transform:scale(1.035)}}
.c-turno{font-size:6.5rem;font-weight:900;line-height:.95;letter-spacing:-3px;font-variant-numeric:tabular-nums}
.c-pet{font-size:2rem;font-weight:800;color:var(--tx);margin-top:4px}
.c-room-lbl{font-size:.85rem;font-weight:800;text-transform:uppercase;letter-spacing:1.5px;color:var(--ts)}
.c-room{font-size:2.8rem;font-weight:900;line-height:1.1;text-align:right}

/* El turno anterior: presente pero claramente secundario */
.card.prev{padding:14px 26px;border-left-width:10px;opacity:.5;box-shadow:none;background:rgba(255,255,255,.6)}
.card.prev .c-turno{font-size:2.6rem;letter-spacing:-1px}
.card.prev .c-pet{font-size:1rem;margin-top:0}
.card.prev .c-room{font-size:1.3rem}
.card.prev .c-room-lbl{font-size:.65rem}
.c-prev-lbl{font-size:.65rem;font-weight:800;text-transform:uppercase;letter-spacing:1.5px;color:var(--ts);margin-bottom:2px}

/* Próximos */
.next-list{flex:1;background:var(--wh);border-radius:20px;padding:18px;overflow:hidden}
.n-item{display:flex;align-items:center;gap:14px;padding:12px 6px;border-bottom:2px solid var(--bd)}
.n-item:last-child{border-bottom:none}
.n-turno{font-size:1.9rem;font-weight:900;min-width:96px;font-variant-numeric:tabular-nums}
.n-pet{font-size:1.15rem;font-weight:700;color:var(--tx);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.n-svc{font-size:.85rem;color:var(--tm);font-weight:700}

.empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--ts);text-align:center}
.empty-em{font-size:4.5rem;margin-bottom:10px}
.empty-t{font-size:1.5rem;font-weight:800}

/* Aviso de sonido */
.sound-hint{position:fixed;inset:0;background:rgba(58,33,64,.82);display:flex;align-items:center;justify-content:center;z-index:99;cursor:pointer}
.sound-box{background:var(--wh);border-radius:24px;padding:44px 54px;text-align:center;max-width:460px}
.sound-box .em{font-size:4rem}
.sound-box h2{font-size:1.6rem;color:var(--p);margin:10px 0 8px}
.sound-box p{font-size:1rem;color:var(--tm);line-height:1.5}
.sound-box .btn{margin-top:20px;background:var(--p);color:#fff;border:none;border-radius:14px;padding:16px 34px;font-size:1.1rem;font-weight:900;font-family:'Nunito',sans-serif;cursor:pointer}
</style>
</head>
<body>

<div class="sound-hint" id="soundHint" onclick="activar()">
  <div class="sound-box">
    <div class="em">📺</div>
    <h2>Pantalla de sala de espera</h2>
    <p>Toca para activar. Cada turno se anuncia con un sonido y una <b>voz</b> que lo lee por los parlantes. Ábrela en el computador conectado al sonido de la clínica.</p>
    <button class="btn">Activar</button>
  </div>
</div>

<div class="hdr">
  <div class="hdr-l">
    <img class="hdr-logo" src="/img/logo.png" alt="Animal Center" onerror="this.style.display='none'">
    <div class="hdr-t">Sala de espera</div>
  </div>
  <div class="clock" id="clock">--:--</div>
</div>

<div class="main">
  <div class="calling-zone">
    <div class="zone-t">🔔 Llamando ahora</div>
    <div class="cards" id="cards"></div>
  </div>
  <div class="side">
    <div class="zone-t">Próximos turnos</div>
    <div class="next-list" id="nextList"></div>
  </div>
</div>

<script>
const API_URL = 'https://script.google.com/macros/s/AKfycbx61iNPH-W-UJLzDX4rC1_NJckbQb-ZVlkzuY27cZRRBbVwsae9QAAJvfysla7e_DSU/exec';
let vistos = {};          // turnos ya anunciados, para no repetir el sonido
let audioCtx = null;
let primeraCarga = true;

function activar() {
  document.getElementById('soundHint').style.display = 'none';
  try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {}
  // Desbloquea la voz: algunos navegadores solo dejan hablar tras un toque.
  try { if ('speechSynthesis' in window) { cargarVoces(); speechSynthesis.speak(new SpeechSynthesisUtterance(' ')); } } catch(e){}
  var el = document.documentElement;
  if (el.requestFullscreen) el.requestFullscreen().catch(function(){});
  cargar();
}

// Campanita generada por código (sin archivos externos)
function ding() {
  if (!audioCtx) return;
  try {
    [880, 1174].forEach(function(freq, i){
      var o = audioCtx.createOscillator(), g = audioCtx.createGain();
      o.type = 'sine'; o.frequency.value = freq;
      o.connect(g); g.connect(audioCtx.destination);
      var t = audioCtx.currentTime + i * 0.18;
      g.gain.setValueAtTime(0.0001, t);
      g.gain.exponentialRampToValueAtTime(0.35, t + 0.02);
      g.gain.exponentialRampToValueAtTime(0.0001, t + 0.5);
      o.start(t); o.stop(t + 0.55);
    });
  } catch(e) {}
}

// ── Voz: lee el turno en voz alta por los parlantes de la clínica ──
// El navegador reproduce la voz; NO puede bajar la música de Spotify (esa
// corre en otra app). Por eso va un 'ding' antes, para que se entienda.
var vozES = null;
function cargarVoces(){
  try {
    var vs = speechSynthesis.getVoices();
    var es = vs.filter(function(v){ return /^es/i.test(v.lang); });
    // Preferimos una voz FEMENINA en español latino (suena más aguda y clara
    // que la grave por defecto). Nombres típicos de voces femeninas es-*.
    var fem = /sabina|helena|laura|paulina|monica|mónica|elena|female|mujer|isabela|catalina|valentina/i;
    vozES = es.filter(function(v){ return fem.test(v.name); })[0]
         || es.filter(function(v){ return /^es-(co|mx|us|419)/i.test(v.lang); })[0]
         || es[0] || null;
  } catch(e){}
}
if ('speechSynthesis' in window) { cargarVoces(); speechSynthesis.onvoiceschanged = cargarVoces; }

// "E-04" → "E 4" (el navegador lo lee "e cuatro"); sin el cero de adelante.
function leerTurno(t){
  t = String(t||'').trim();
  var m = t.match(/^([A-Za-z]+)\s*-?\s*(\d+)$/);
  return m ? (m[1] + ' ' + parseInt(m[2], 10)) : t.replace(/-/g,' ');
}
// Avisa a la extensión "Baja música al llamar turno" (si está instalada) que
// baje / suba Spotify. Si NO hay extensión, este evento no molesta a nadie.
function duck(on){
  try { window.dispatchEvent(new CustomEvent('ac-duck', { detail: { on: !!on } })); } catch(e){}
}

// Le confirma al backend que ESTE llamado sonó en la sala. Con eso el médico
// ve en su tarjeta "Sonó en la sala ✓" y no queda adivinando.
function confirmarAnuncio(r){
  try {
    fetch(API_URL, { method:'POST', body: JSON.stringify({ action:'anunciado', turno: r.turno, calledAt: r.calledAt || '' }) });
  } catch(e){}
}

// Nombre(s) de la(s) mascota(s) del turno, para MOSTRAR. Si vienen varias
// (petsExtra), se listan todas: "Mila, Toby, Luna". Así el cliente ve que va
// a pasar con TODAS sus mascotas, no solo una.
function nombreMascotas(r){
  var base = String(r.petName || '').trim();
  var ex   = String(r.petsExtra || '').trim();
  if (!ex) return base;
  return base ? (base + ', ' + ex) : ex;
}
// Igual pero para DECIR en voz alta: la última se une con "y" para que suene
// natural ("Mila, Toby y Luna").
function mascotasHabladas(r){
  var todas = nombreMascotas(r).split(',').map(function(s){ return s.trim(); }).filter(Boolean);
  if (todas.length <= 1) return todas[0] || '';
  return todas.slice(0, -1).join(', ') + ' y ' + todas[todas.length - 1];
}

function hablarTurno(r){
  if (!('speechSynthesis' in window)) return;
  var turno = leerTurno(r.turno);
  var room  = r.consultorio ? ('pase al consultorio ' + r.consultorio) : 'pase adelante';
  var pet   = mascotasHabladas(r) ? (', con ' + mascotasHabladas(r)) : '';
  // Ej: "Turno E 4, pase al consultorio Boom Boom, con Mila."
  var frase = 'Turno ' + turno + ', ' + room + pet + '.';
  try {
    var u = new SpeechSynthesisUtterance(frase);
    u.lang = 'es-CO'; u.rate = 0.94; u.pitch = 1.3; u.volume = 1;   // pitch alto = voz más aguda
    if (vozES) u.voice = vozES;
    // Al terminar (o si falla) sube la música de nuevo. La red de seguridad
    // la sube igual a los 9s por si el evento 'end' no llega.
    u.onend = u.onerror = function(){ duck(false); };
    setTimeout(function(){ duck(false); }, 9000);
    speechSynthesis.cancel();
    speechSynthesis.speak(u);
  } catch(e){ duck(false); }
}

function esc(s){ if(!s)return''; return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function serviceColor(s){
  s=(s||'').toLowerCase();
  // Control primero: "Control especializado" tiene las dos palabras y se
  // agrupa (azul) con los controles, no con la naranja de especializada.
  if(s.indexOf('control')!==-1)return'#2563eb';
  if(s.indexOf('especial')!==-1)return'#f97316';
  if(s.indexOf('vacun')!==-1)return'#8e3f9e';
  if(s.indexOf('inyect')!==-1)return'#eab308';
  if(s.indexOf('rayos')!==-1||s.indexOf('ecograf')!==-1)return'#be123c';
  if(s.indexOf('viajer')!==-1)return'#0891b2';
  if(s.indexOf('general')!==-1)return'#16a34a';
  return'#94a3b8';
}

function reloj(){
  var n = new Date();
  document.getElementById('clock').textContent =
    String(n.getHours()).padStart(2,'0') + ':' + String(n.getMinutes()).padStart(2,'0');
}

function esHoy(ts){
  var d = new Date(ts);
  return !isNaN(d) && d.toDateString() === new Date().toDateString();
}

function cargar(){
  fetch(API_URL + '?action=records')
    .then(function(r){ return r.json(); })
    .then(function(res){
      if (!res || !res.ok) return;
      var hoy = (res.records || []).filter(function(r){ return esHoy(r.timestamp); });
      pintar(
        hoy.filter(function(r){ return r.estadoTurno === 'llamando'; }),
        // "Próximos" = los que esperan. Incluye 'llenando' (todavía llenando la
        // ficha): igual están en la sala esperando, así que deben verse en la
        // TV. Sin esto, los que no terminan el registro —muchas consultas
        // generales— nunca aparecían.
        hoy.filter(function(r){ var e = r.estadoTurno || 'esperando'; return e === 'esperando' || e === 'llenando'; })
      );
    })
    .catch(function(){});
}

function pintar(llamando, esperando){
  // ── Llamando ahora ──
  // Solo el turno ACTUAL (grande) y el ANTERIOR (chico). Ordenamos por
  // la hora del llamado: el último llamado es el que manda.
  llamando.sort(function(a,b){
    return new Date(b.calledAt || 0) - new Date(a.calledAt || 0);
  });
  var actual   = llamando[0] || null;
  var anterior = llamando[1] || null;

  var cont = document.getElementById('cards');
  if (!actual) {
    cont.innerHTML = '<div class="empty"><div class="empty-em">🐾</div>'+
      '<div class="empty-t">Espera a ser llamado</div></div>';
  } else {
    var html = '';
    [actual, anterior].forEach(function(r, i){
      if (!r) return;
      var color = serviceColor(r.service);
      var clave = r.turno + '|' + (r.calledAt || '');
      var nuevo = (i === 0) && !vistos[clave] && !primeraCarga;
      html += '<div class="card'+(i===1?' prev':'')+(nuevo?' nuevo':'')+'" style="border-left-color:'+color+'">'+
        '<div>'+(i===1?'<div class="c-prev-lbl">Anterior</div>':'')+
        '<div class="c-turno" style="color:'+color+'">'+esc(r.turno||'—')+'</div>'+
        '<div class="c-pet">'+esc(nombreMascotas(r))+'</div></div>'+
        '<div><div class="c-room-lbl">Consultorio</div>'+
        '<div class="c-room" style="color:'+color+'">'+esc(r.consultorio||'—')+'</div></div>'+
      '</div>';
      if (nuevo) {
        duck(true); ding();
        setTimeout((function(rec){ return function(){ hablarTurno(rec); }; })(r), 850);
        confirmarAnuncio(r);   // le avisa al médico que SÍ sonó en la sala
      }
    });
    cont.innerHTML = html;
  }

  // La clave incluye la hora del llamado: si vuelven a llamar al MISMO
  // turno, cambia la clave y la campanita suena de nuevo.
  var actuales = {};
  llamando.forEach(function(r){ actuales[r.turno + '|' + (r.calledAt || '')] = true; });
  vistos = actuales;
  primeraCarga = false;

  // ── Próximos ──
  var lista = document.getElementById('nextList');
  var prox = esperando
    .sort(function(a,b){ return new Date(a.timestamp) - new Date(b.timestamp); })
    .slice(0, 8);
  if (!prox.length) {
    lista.innerHTML = '<div class="empty"><div class="empty-t" style="font-size:1.1rem">Nadie en espera</div></div>';
  } else {
    var h = '';
    prox.forEach(function(r){
      var color = serviceColor(r.service);
      h += '<div class="n-item"><div class="n-turno" style="color:'+color+'">'+esc(r.turno||'—')+'</div>'+
        '<div style="min-width:0"><div class="n-pet">'+esc(nombreMascotas(r))+'</div>'+
        '<div class="n-svc">'+esc(r.service||'')+'</div></div></div>';
    });
    lista.innerHTML = h;
  }
}

reloj();
setInterval(reloj, 20000);

// Detección casi en vivo: en vez de traer TODOS los registros cada 8s (lento),
// sondeamos una versión BARATA cada 2s y solo recargamos cuando algo cambió.
// Así un llamado suena en ~2s en lugar de tardar hasta 8s.
var ultimaVersion = null;
function chequearVersion(){
  fetch(API_URL + '?action=version')
    .then(function(r){ return r.json(); })
    .then(function(res){
      if (!res || !res.ok) return;
      if (ultimaVersion === null) { ultimaVersion = res.v; return; }
      if (res.v !== ultimaVersion) { ultimaVersion = res.v; cargar(); }
    })
    .catch(function(){});
}
setInterval(chequearVersion, 2000);   // casi en vivo
setInterval(cargar, 30000);           // red de seguridad por si se pierde un cambio
// La pantalla del TV queda abierta todo el día y nunca se reabre, así que sola
// no toma los cambios de código. Cada hora se recarga para traer la versión
// nueva (el service worker la baja fresca). No recarga si justo está sonando un
// llamado, para no cortarlo.
setInterval(function(){
  try { if ('speechSynthesis' in window && speechSynthesis.speaking) return; } catch (e) {}
  location.reload();
}, 3600000);
// Al volver al frente (el navegador congela los temporizadores en segundo
// plano, y el equipo pudo dormirse) recuperamos de inmediato lo perdido.
document.addEventListener('visibilitychange', function(){ if (!document.hidden) { chequearVersion(); cargar(); } });
window.addEventListener('focus', function(){ chequearVersion(); });
cargar();
</script>
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', function () {
    navigator.serviceWorker.register('/sw.js').catch(function () {});
  });
}
</script>
</body>
</html>
