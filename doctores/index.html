<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Médicos — Animal Center</title>
<!-- El médico llega a la clínica y necesita entrar de una. No puede depender
     de una notificación: si nadie marcó turno todavía, no hay ningún mensaje
     que tocar. Con esto el dashboard se agrega a la pantalla de inicio y
     queda como cualquier otra app: un toque y adentro. -->
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#7c3aed">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="AC Médicos">
<link rel="apple-touch-icon" href="/img/icono-app-v2.png">
<link rel="icon" href="/img/icono-app-v2.png">
<!-- Calienta las conexiones antes de que el JS las use: el backend (de donde
     sale la cola) y el servidor de fuentes. Ahorra el DNS+TLS del primer pedido. -->
<link rel="preconnect" href="https://script.google.com">
<link rel="preconnect" href="https://script.googleusercontent.com">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#faf7ff;--bg2:#f3eeff;
  --tx:#1a0a2e;--tm:#6b5c7e;--ts:#b0a4bf;
  --wh:#ffffff;--bd:#e8dff5;
  --p:#7c3aed;--pl:#f5f0ff;--pd:#5b21b6;
  --ok:#16a34a;--okl:#f0fdf4;--er:#dc2626;
  --pur:#7c3aed;--purl:#f5f0ff;
}
html,body{font-family:'DM Sans',system-ui,sans-serif;background:var(--bg);color:var(--tx);min-height:100vh}

/* ── Header ── */
.hdr{background:var(--wh);border-bottom:1px solid var(--bd);padding:0 24px;height:60px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 1px 0 var(--bd)}
.hdr-brand{display:flex;align-items:center;gap:10px}
.hdr-brand-icon{width:34px;height:34px;background:var(--p);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:1.1rem}
.hdr-brand-text{font-size:.95rem;font-weight:700;color:var(--tx)}
.hdr-brand-sub{font-size:.72rem;color:var(--tm);margin-top:1px}
.hdr-right{display:flex;align-items:center;gap:10px}
.badge-pending{background:#7c3aed;color:#fff;border-radius:99px;padding:4px 9px;font-size:.72rem;font-weight:700;display:none;white-space:nowrap;flex-shrink:0}
.badge-pending.show{display:inline-flex;align-items:center}
.btn-hdr{border:1.5px solid var(--bd);border-radius:8px;padding:6px 14px;color:var(--tm);font-size:.78rem;font-weight:600;cursor:pointer;background:var(--wh);font-family:'DM Sans',sans-serif;transition:all .2s}
.btn-hdr:hover{border-color:var(--p);color:var(--p)}
#hdrIcon{cursor:pointer}
/* Chip del médico: verde = está recibiendo notificaciones (especialista, o
   general que recepción puso de turno). Sin verde = puede entrar y mirar,
   pero no le llegan avisos de consulta general. */
.medico-chip{display:inline-flex;align-items:center;gap:7px;border:1.5px solid var(--bd);border-radius:8px;padding:6px 12px;background:var(--wh);color:var(--tm);font-size:.8rem;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;max-width:190px}
.medico-chip:hover{border-color:var(--p)}
.medico-chip .mc-dot{width:9px;height:9px;border-radius:50%;background:var(--bd);flex-shrink:0}
.medico-chip .mc-name{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.medico-chip.activo{color:#15803d;border-color:#86efac;background:#f0fdf4}
.medico-chip.activo .mc-dot{background:#16a34a}
/* Modal de identidad */
.idm-bg{position:fixed;inset:0;background:rgba(20,10,35,.5);z-index:600;display:flex;align-items:center;justify-content:center;padding:18px}
.idm{background:var(--wh);border-radius:18px;width:100%;max-width:400px;max-height:86vh;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.idm-t{font-size:1.15rem;font-weight:700;color:var(--tx);padding:20px 22px 4px}
.idm-sub{font-size:.82rem;color:var(--tm);line-height:1.5;padding:0 22px 12px}
.idm-lista{overflow-y:auto;padding:0 12px;flex:1}
.idm-op{display:flex;flex-direction:column;gap:1px;padding:11px 12px;border-radius:11px;cursor:pointer;border:1.5px solid transparent}
.idm-op:hover{background:var(--bg2)}
.idm-op.sel{background:#f0fdf4;border-color:#86efac}
.idm-op-n{font-size:.9rem;font-weight:700;color:var(--tx)}
.idm-op-e{font-size:.73rem;color:var(--tm)}
.idm-todos{font-weight:600;color:var(--tm)}
.idm-cerrar{margin:6px 18px 18px;background:var(--bg2);border:none;border-radius:12px;padding:13px;font-size:.9rem;font-weight:700;color:var(--tm);cursor:pointer;font-family:'DM Sans',sans-serif}
.idm-cerrar:hover{background:var(--bd)}

/* ── Search bar ── */
.srch{background:var(--wh);border-bottom:1px solid var(--bd);padding:10px 24px;position:sticky;top:60px;z-index:99}
.srch-inner{max-width:900px;margin:0 auto;display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.srch-wrap{flex:1 1 180px;min-width:0;position:relative}
.srch-wrap input{width:100%;border:1.5px solid var(--bd);border-radius:9px;padding:9px 14px 9px 36px;font-size:.87rem;outline:none;color:var(--tx);font-family:'DM Sans',sans-serif;background:var(--bg);transition:border .2s}
.srch-wrap input:focus{border-color:var(--p);background:var(--wh)}
.srch-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--ts);font-size:.85rem;pointer-events:none}
.filter-btns{display:flex;gap:6px}
.fbtn{border:1.5px solid var(--bd);border-radius:99px;padding:6px 14px;font-size:.76rem;font-weight:600;cursor:pointer;background:transparent;color:var(--tm);font-family:'DM Sans',sans-serif;transition:all .2s}
.fbtn.active{border-color:var(--p);background:var(--pl);color:var(--p)}

/* ── Main content ── */
.cnt{max-width:900px;margin:0 auto;padding:20px 24px}
.date-group{margin-bottom:24px}
.date-lbl{font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--ts);margin-bottom:12px;display:flex;align-items:center;gap:8px}
.date-lbl::after{content:'';flex:1;height:1px;background:var(--bd)}

/* ── Record card ── */
.rec{background:var(--wh);border-radius:12px;border:1px solid var(--bd);margin-bottom:8px;overflow:hidden;transition:box-shadow .2s,border-color .2s}
.rec:hover{box-shadow:0 2px 12px rgba(124,58,237,.08);border-color:#d8ccf0}
.rec.reviewed{opacity:.5;background:var(--bg)}
.rec-head{padding:14px 18px;cursor:pointer;display:flex;align-items:center;gap:12px}
.rec-emoji{width:38px;height:38px;border-radius:10px;background:var(--pl);display:flex;align-items:center;justify-content:center;font-size:1.2rem;flex-shrink:0}
.rec.reviewed .rec-emoji{background:var(--bg2)}
.rec-info{flex:1;min-width:0}
.rec-top{display:flex;justify-content:space-between;align-items:center;gap:8px;margin-bottom:5px}
.rec-breed{font-weight:400;color:var(--tm);font-size:.82rem}
.rec-name{font-size:.93rem;font-weight:700;color:var(--tx);display:flex;align-items:center;gap:7px;flex-wrap:wrap}
.rv-badge{font-size:.62rem;background:var(--bg2);color:var(--ts);border-radius:99px;padding:2px 8px;font-weight:600}
.hc-badge{font-size:.62rem;background:var(--p);color:#fff;border-radius:99px;padding:2px 9px;font-weight:700;letter-spacing:.2px}
.turno-badge{font-size:.7rem;color:#fff;border-radius:7px;padding:2px 9px;font-weight:700;letter-spacing:.3px;font-variant-numeric:tabular-nums}
.rec-meta{font-size:.74rem;color:var(--tm);margin-top:3px;display:flex;flex-wrap:wrap;gap:8px}
.rec-service{background:var(--bg2);color:var(--p);border-radius:6px;padding:3px 9px;font-size:.68rem;font-weight:600;flex-shrink:0}
.rec-time{font-size:.72rem;font-weight:700;color:var(--tm);flex-shrink:0;text-align:right}
.rec-time.esp-medio{color:#b45309}
.rec-time.esp-mucho{color:#dc2626}
.rec-arrow{color:var(--ts);font-size:.65rem;flex-shrink:0;transition:transform .25s;margin-left:4px}
.rec.open .rec-arrow{transform:rotate(180deg)}

/* ── Expanded body ── */
.rec-body{display:none;padding:0 18px 18px;border-top:1px solid var(--bd)}
.rec.open .rec-body{display:block}

.section{margin-top:16px}
.sec-title{font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--p);margin-bottom:8px}

.hc-block{background:var(--purl);border:1.5px solid #c4b5fd;border-radius:10px;padding:10px 14px;margin-bottom:10px;display:flex;align-items:center;gap:10px}
.hc-block-label{font-size:.63rem;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--p)}
.hc-block-val{font-size:1rem;font-weight:700;color:var(--pd)}

.grid2{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px}
.field{background:var(--bg);border-radius:8px;padding:9px 11px}
.field .fl{font-size:.62rem;font-weight:600;text-transform:uppercase;letter-spacing:.4px;color:var(--ts);margin-bottom:3px}
.field .fv{font-size:.82rem;color:var(--tx);font-weight:500;line-height:1.4}
.full-field{background:var(--bg);border-radius:8px;padding:9px 11px;margin-top:6px}
.sym-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:6px}
.sym{background:var(--bg);border-radius:8px;padding:8px 10px}
.sym .sl{font-size:.62rem;font-weight:600;text-transform:uppercase;letter-spacing:.4px;color:var(--ts);margin-bottom:3px}
.sym .sv{font-size:.8rem;font-weight:500;line-height:1.4}
.sv.ok{color:#16a34a}.sv.warn{color:#d97706}.sv.bad{color:#dc2626}

.rec-actions{display:flex;gap:8px;margin-top:16px;flex-wrap:wrap}
.btn-copy{flex:1;padding:10px 14px;border:1.5px solid var(--p);border-radius:9px;background:var(--wh);color:var(--p);font-size:.8rem;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s;min-width:130px}
.btn-copy:hover{background:var(--pl)}
.btn-copy.copied{border-color:var(--ok);color:var(--ok);background:var(--okl)}

/* ── States ── */
.empty{text-align:center;padding:64px 20px}
.empty-icon{font-size:2.8rem;margin-bottom:12px}
.empty-title{font-size:.95rem;font-weight:600;color:var(--tx);margin-bottom:4px}
.empty-sub{font-size:.82rem;color:var(--tm)}
.spinner{width:36px;height:36px;border:2.5px solid var(--bd);border-top-color:var(--p);border-radius:50%;animation:spin .7s linear infinite;margin:64px auto}
.cargando{display:flex;flex-direction:column;align-items:center;justify-content:center}
.cargando .spinner{margin:64px auto 0}
.cargando-t{margin-top:16px;font-size:.95rem;font-weight:700;color:var(--tm)}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── Toast ── */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--tx);color:#fff;border-radius:10px;padding:10px 20px;font-size:.82rem;font-weight:600;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}

/* ── Sala de espera (colas) ── */
.filas{display:grid;grid-template-columns:1fr 1fr;gap:14px;align-items:start}
.filas.una{grid-template-columns:1fr;max-width:520px;margin:0 auto}

/* Entro / salgo de turno */
.turno-tgl{border:2px solid var(--bd);background:var(--wh);color:var(--tm);border-radius:12px;
  padding:9px 14px;font-family:'Nunito',sans-serif;font-size:.85rem;font-weight:800;cursor:pointer;
  white-space:nowrap;display:flex;align-items:center;gap:7px;transition:all .15s}
.turno-tgl::before{content:'';width:9px;height:9px;border-radius:50%;background:var(--ts)}
.turno-tgl.on{border-color:#16a34a;background:#f0fdf4;color:#15803d}
.turno-tgl.on::before{background:#16a34a;box-shadow:0 0 0 3px rgba(22,163,74,.2)}
.turno-tgl:disabled{opacity:.5;cursor:wait}
/* ── Bienvenida al empezar el turno ──
   El médico abre la app y lo primero que ve es la pregunta que importa:
   ¿arrancamos? Un solo botón grande. El selector de quién eres va abajo,
   porque casi siempre ya está elegido de la vez anterior. */
/* No es un pop-up: es la pantalla de entrada. Va SIEMPRE primero, así que
   tapa el dashboard por completo. Antes se veía translúcida y con el
   dashboard borroso detrás — daba la sensación de estar interrumpiendo
   algo, cuando en realidad todavía no había empezado nada. */
.bienv{position:fixed;inset:0;background:var(--bg);z-index:500;
  display:flex;align-items:center;justify-content:center;padding:20px}
.bienv-box{background:var(--wh);border:1px solid var(--bd);border-radius:20px;
  padding:30px 24px;max-width:380px;width:100%;
  box-shadow:0 4px 24px rgba(26,10,46,.06);text-align:center}
.bienv-logo{width:64px;height:64px;border-radius:16px;object-fit:cover;margin:0 auto 14px;display:block}
.bienv-h{font-size:1.35rem;font-weight:700;color:var(--tx);margin-bottom:6px}
.bienv-sub{font-size:.86rem;color:var(--tm);line-height:1.5;margin-bottom:20px}
.bienv-btn{width:100%;border:none;border-radius:14px;background:#16a34a;color:#fff;
  padding:16px;font-size:1.05rem;font-weight:700;font-family:'DM Sans',sans-serif;cursor:pointer;
  box-shadow:0 4px 14px rgba(22,163,74,.3);transition:transform .1s}
.bienv-btn:active{transform:scale(.98)}
/* Deshabilitado tiene que PARECER deshabilitado: si sigue verde y grande,
   el médico lo toca y no pasa nada. */
.bienv-btn:disabled{background:var(--bg2);color:var(--ts);box-shadow:none;cursor:default}
.bienv-quien{margin-top:18px;padding-top:18px;border-top:1px solid var(--bd)}
.bienv-lbl{font-size:.76rem;color:var(--tm);font-weight:600;margin-bottom:8px;display:block}
.bienv-sel{width:100%;max-width:100%;border:1.5px solid var(--bd);border-radius:10px;padding:11px;
  font-size:.87rem;font-family:'DM Sans',sans-serif;color:var(--tx);background:var(--wh);outline:none}
.bienv-sel:focus{border-color:var(--p)}
.bienv-luego{margin-top:14px;background:none;border:none;color:var(--tm);font-size:.8rem;
  font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;text-decoration:underline}

/* Modo prueba: imposible de ignorar. Si queda encendido sin querer, los
   médicos dejan de recibir avisos y nadie se entera. */
.prueba-aviso{background:#dc2626;color:#fff;text-align:center;padding:9px 16px;
  font-size:.8rem;font-weight:700;letter-spacing:.3px}
/* Aviso de que no le está llegando nada */
@media(max-width:900px){.filas{grid-template-columns:1fr}}
.fila{background:var(--wh);border:1px solid var(--bd);border-radius:14px;overflow:hidden}
/* Encabezado neutro a propósito: el color pertenece al servicio, no a la fila */
.fila-hd{padding:11px 14px;background:var(--tx);color:#fff;display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none;gap:8px}
.fila-hd:hover{filter:brightness(1.35)}
.fila-t{font-size:.88rem;font-weight:700}
.fila-hd-r{display:flex;align-items:center;gap:6px;flex-shrink:0}
.fila-n{font-size:.72rem;opacity:.95;background:rgba(255,255,255,.2);border-radius:99px;padding:2px 9px;white-space:nowrap}
.fila-cv{font-size:.7rem;opacity:.9;width:12px;text-align:center}
.fila-bd{padding:12px 13px}
.next-box{border:1.5px dashed var(--bd);border-radius:11px;padding:11px;margin-bottom:11px;background:var(--bg)}
.next-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.next-tp{display:flex;align-items:baseline;gap:8px;min-width:0}
.next-turno{font-size:1.5rem;font-weight:700;line-height:1;font-variant-numeric:tabular-nums}
.next-pet{font-size:.95rem;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.next-reg{flex-shrink:0}
.next-espera-top{font-size:.74rem;font-weight:700;color:var(--tm);flex-shrink:0;text-align:right}
.next-espera-top.esp-medio{color:#b45309}
.next-espera-top.esp-mucho{color:#dc2626}
/* Debajo del turno: registro (Haciendo registro) + cita, como en recepción. */
.next-sub{display:flex;flex-wrap:wrap;gap:6px;margin:6px 0 2px}
.next-owner{font-size:.76rem;font-weight:600;margin-top:4px}
.next-meta{font-size:.72rem;color:var(--tm);margin-top:2px}
/* Tiempo de espera. A los 30 min se pone ámbar, a los 45 rojo: el médico
   no tiene que leer el número para darse cuenta de que alguien lleva rato. */
.next-espera{font-size:.74rem;font-weight:700;color:var(--tm);margin-top:4px}
.espera{font-weight:700}
.esp-medio{color:#b45309}
.esp-mucho{color:#dc2626}
.next-espera.esp-medio{color:#b45309}
.next-espera.esp-mucho{color:#dc2626}
/* Sugerencia de a cuál llamar primero. Solo aparece cuando el médico tiene
   las dos filas y tiene que elegir. */
.sug{font-size:.72rem;font-weight:700;border-radius:7px;padding:6px 9px;margin-bottom:9px;line-height:1.4}
.sug-si{background:#f0fdf4;color:#15803d;border:1.5px solid #86efac}
.sug-no{background:var(--bg);color:var(--tm);border:1.5px solid var(--bd)}
.next-baja{opacity:.75}
.next-ctrls{display:flex;gap:6px;margin-top:9px}
.next-ctrls select{flex:1;border:1.5px solid var(--bd);border-radius:8px;padding:7px 8px;font-size:.76rem;font-family:'DM Sans',sans-serif;background:var(--wh);outline:none;min-width:0}
.btn-call{border:none;border-radius:8px;padding:7px 13px;color:#fff;font-size:.76rem;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;white-space:nowrap}
/* Llamar apagado: quedó un paciente sin cerrar. No lleva texto que lo
   explique — su tarjeta está justo arriba con su propio ✓ Atendido. */
.btn-call.apagado{background:var(--bg2);color:var(--ts);cursor:not-allowed;opacity:.7}
.next-ctrls select:disabled{opacity:.5;cursor:not-allowed}
.calling{border:1.5px solid #86efac;background:#f0fdf4;border-radius:11px;padding:10px 12px;margin-bottom:8px}
.calling-top{display:flex;align-items:center;justify-content:space-between;gap:8px}
.calling-t{font-size:1.1rem;font-weight:700;color:#15803d;font-variant-numeric:tabular-nums}
.calling-m{font-size:.73rem;color:var(--tm);margin-top:2px}
.calling-btns{display:flex;flex-direction:column;gap:5px;flex-shrink:0}
/* Llamar otra vez y Ausente van juntos: los dos son "todavía no pasó".
   Atendido va abajo y solo: es el que cierra el caso. */
.calling-fila1{display:flex;gap:5px}
.calling-fila1 .btn-aus{flex:1}
.calling-fila1 .btn-atender{flex:1}
.calling-fila2{display:flex;gap:8px;align-items:center;justify-content:space-between;margin-top:2px}
/* "Atender" es la acción principal: verde lleno, junto a Ausente. */
.btn-atender{border:none;background:#16a34a;color:#fff;border-radius:7px;padding:6px 12px;font-size:.74rem;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;white-space:nowrap}
.btn-atender:hover{background:#15803d}
/* "Marcar atendido" es el caso raro (último paciente): discreto, no satura. */
.btn-sutil{border:none;background:none;color:var(--ts);font-size:.66rem;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;text-decoration:underline;padding:2px 4px;white-space:nowrap}
.btn-sutil:hover{color:var(--tm)}
.calling-fila2 .btn-again{font-size:.68rem;padding:4px 9px}
.btn-aus{border:1.5px solid var(--bd);background:var(--wh);color:var(--tm);border-radius:7px;
  padding:5px 10px;font-size:.72rem;font-weight:700;cursor:pointer;
  font-family:'DM Sans',sans-serif;white-space:nowrap}
.btn-aus:hover{border-color:#f59e0b;color:#b45309;background:#fffbeb}
.btn-again{border:1.5px solid #86efac;background:var(--wh);color:#15803d;border-radius:7px;padding:5px 10px;font-size:.72rem;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;white-space:nowrap}
.btn-again:hover{background:#f0fdf4}
.btn-done{border:1.5px solid #86efac;background:var(--wh);color:#15803d;border-radius:7px;padding:5px 10px;font-size:.72rem;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;white-space:nowrap}
.q-item{display:flex;align-items:center;gap:9px;padding:7px 9px;border-radius:8px;background:var(--bg);margin-bottom:5px}
.q-turno{font-weight:700;font-size:.82rem;min-width:42px;font-variant-numeric:tabular-nums}

/* ── Celular ──
   El médico entra desde el WhatsApp con una mano y necesita ver a quién
   llamar, no el menú. Todo el encabezado tiene que caber en tres renglones

        overflow:hidden;text-overflow:ellipsis}
  /* La leyenda de colores sobra acá: cada tarjeta ya dice el servicio con
     todas las letras, y en el celular cuesta dos renglones. */

  .srch-wrap{flex:1 1 100%}
  #miMedico{flex:1 1 140px}

</style>

<body>

<!-- ¿Quién eres? Se abre al tocar el chip del nombre. Solo elige identidad
     (el turno lo maneja recepción). Queda guardado en el dispositivo. -->
<div class="idm-bg" id="identModal" style="display:none" onclick="if(event.target===this)cerrarIdentidad()">
  <div class="idm">
    <div class="idm-t">¿Quién eres?</div>
    <div class="idm-sub">Elige tu nombre. Queda guardado en este celular para siempre.</div>
    <div class="idm-lista" id="identLista"></div>
    <button class="idm-cerrar" onclick="cerrarIdentidad()">Cerrar</button>
  </div>
</div>

<div class="prueba-aviso" id="pruebaAviso" style="display:none">
  🧪 MODO PRUEBA ENCENDIDO — los médicos NO están recibiendo avisos por WhatsApp
</div>

<header class="hdr">
  <div class="hdr-brand">
    <!-- La huella recarga: si el médico ve datos viejos, toca el logo. -->
    <div class="hdr-brand-icon" id="hdrIcon" onclick="loadRecords()" title="Toca para actualizar"><img src="/img/paw.jpg" alt="Animal Center" style="width:100%;height:100%;object-fit:cover;border-radius:8px" onerror="this.remove();document.getElementById('hdrIcon').textContent='🐾'"></div>
    <div>
      <div class="hdr-brand-text">Animal Center</div>
      <div class="hdr-brand-sub" id="lastUpdated">Cargando registros...</div>
    </div>
  </div>
  <div class="hdr-right">
    <span class="badge-pending" id="pendingCount"></span>
    <!-- El nombre del médico que está viendo la página. Verde = está
         recibiendo notificaciones. Clic para cambiar de médico. -->
    <button class="medico-chip" id="medicoChip" onclick="abrirIdentidad()">
      <span class="mc-dot"></span><span class="mc-name">Elige tu nombre</span>
    </button>
  </div>
</header>

<div class="srch">
  <div class="srch-inner">
    <div class="filter-btns">
      <button class="fbtn active" id="f-sala" onclick="setView('sala')">🔔 Sala de espera</button>
      <button class="fbtn" id="f-pending" onclick="setView('pending')">📋 Anamnesis</button>
      <button class="fbtn" id="f-reviewed" onclick="setView('reviewed')">✓ Atendidas</button>
    </div>
    <input type="date" id="dateFilter" class="date-filter" style="display:none" onchange="renderAll()">
  </div>
  <div class="srch-inner legend" style="margin-top:8px">
    <span class="lg"><span class="lg-dot" style="background:#16a34a"></span>General</span>
    <span class="lg"><span class="lg-dot" style="background:#f97316"></span>Especializada</span>
    <span class="lg"><span class="lg-dot" style="background:#2563eb"></span>Control</span>
    <span class="lg"><span class="lg-dot" style="background:#8e3f9e"></span>Vacunación</span>
    <span class="lg"><span class="lg-dot" style="background:#eab308"></span>Inyectología</span>
    <span class="lg"><span class="lg-dot" style="background:#be123c"></span>Rayos X y Ecografía</span>
    <span class="lg"><span class="lg-dot" style="background:#0891b2"></span>Viajero</span>
  </div>
</div>

<div class="cnt" id="mainCnt">
  <div class="spinner"></div>
</div>

<div class="toast" id="toast"></div>

<script>
const API_URL = 'https://script.google.com/macros/s/AKfycbx61iNPH-W-UJLzDX4rC1_NJckbQb-ZVlkzuY27cZRRBbVwsae9QAAJvfysla7e_DSU/exec';
let allRecords = [];
let activeView = 'sala';

// Día de hoy como texto, para no mostrar una caché de ayer.
function hoyKey(){ return new Date().toDateString(); }

// Render instantáneo desde la última cola guardada en este dispositivo. El
// médico ve su sala AL TOQUE (aunque esté unos segundos vieja) mientras el
// backend responde por detrás. Sin esto, veía un spinner de 1-3s cada vez.
function recordsDelCache(){
  try {
    var c = JSON.parse(localStorage.getItem('ac_records') || 'null');
    if (!c || c.dia !== hoyKey() || !Array.isArray(c.records)) return false;
    allRecords = c.records;
    if (Array.isArray(c.deTurno)) deTurno = c.deTurno;
    deducirMedico();      // si viene del WhatsApp (?t=), ya sabemos quién es
    pintarMedicoChip();
    renderAll();
    updateCounts();
    return true;
  } catch(e){ return false; }
}

function loadRecords(silent) {
  // Spinner SOLO si no hay nada que mostrar todavía (ni caché ni datos). Si ya
  // pintamos algo, se refresca sin parpadeo.
  if (!silent && !allRecords.length) {
    document.getElementById('mainCnt').innerHTML =
      '<div class="cargando"><div class="spinner"></div><div class="cargando-t">Cargando tu sala…</div></div>';
    document.getElementById('lastUpdated').textContent = 'Actualizando...';
  }
  const pedidoEn = Date.now();
  fetch(API_URL + '?action=records')
    .then(function(r){ return r.json(); })
    .then(function(res) {
      if (res && res.ok) {
        allRecords = res.records || [];
        if (aplicaEsteTurno(pedidoEn)) deTurno = res.deTurno || [];
        // Guarda la cola para el próximo arranque instantáneo.
        try { localStorage.setItem('ac_records', JSON.stringify({ dia: hoyKey(), records: allRecords, deTurno: deTurno })); } catch(e){}
        document.getElementById('pruebaAviso').style.display = res.modoPrueba ? '' : 'none';
        pintarMedicoChip();   // el turno llega acá y define el color del chip
        renderAll();
        updateCounts();
        deducirMedico();    // si vino del WhatsApp, ya sabemos quién es
        abrirDesdeLink();   // si vino desde la notificación, lo dejamos en la sala
        // La puerta NO se decide acá: la maneja cargarMedicos, que llega
        // en la mitad del tiempo. Esto corre en paralelo, por detrás.
        const now = new Date();
        document.getElementById('lastUpdated').textContent =
          'Última actualización: ' + now.getHours() + ':' + String(now.getMinutes()).padStart(2,'0');
      } else {
        showError('Error al cargar los registros.');
      }
    })
    .catch(function(err) {
      showError('Error de conexión: ' + err.message);
    });
}

function showError(msg) {
  document.getElementById('mainCnt').innerHTML =
    '<div class="empty"><div class="empty-icon">⚠️</div><div class="empty-title">Algo salió mal</div><div class="empty-sub">' + msg + '</div></div>';
}

// ── Sala de espera: filas y consultorios ─────────────────────
// Los consultorios son flexibles: sirven para especialidad Y para consulta
// general. Los 2 de vacunación son aparte (a veces se usan para
// inyectología o consulta), por eso también están disponibles.
const ROOMS_MAIN = ['Boom Boom','Piel','Ojitos','Meaw Meaw','Endocrino','Gastro','Terapia física','Viajero','Rayos X','Eco','General'];
const ROOMS_VAC  = ['Vacunación 1','Vacunación 2'];

function roomsFor(filaKey) {
  // Cualquier fila puede usar cualquier consultorio.
  return ROOMS_MAIN.concat(ROOMS_VAC);
}

// El consultorio que MÁS probablemente use el médico para este paciente,
// según su especialidad (o el servicio, para viajero y rayos). Se ofrece
// preseleccionado para ahorrarle el clic y evitar que elija mal. Si no hay
// uno claro (consulta general, etc.), devuelve '' → el médico elige a mano.
const CONS_POR_ESP = {
  'cardiologia':'Boom Boom', 'dermatologia':'Piel', 'oftalmologia':'Ojitos',
  'medicina felina':'Meaw Meaw', 'gastroenterologia':'Gastro',
  'terapia fisica':'Terapia física',
  'endocrinologia':'Endocrino', 'neonatologia':'Endocrino',
  // Angie hace imagenología. Cubre los dos caminos: el servicio propio
  // "Rayos X y Ecografía" (más abajo, por service) Y la especialidad
  // "Imagenología" dentro de una consulta/control especializado.
  'imagenologia':'Rayos X'
};
function consultorioPreferido(r) {
  var esp = normEsp(r.specialty || '');
  if (CONS_POR_ESP[esp]) return CONS_POR_ESP[esp];
  var s = String(r.service || '').toLowerCase();
  if (s.indexOf('viajer') !== -1) return 'Viajero';
  if (s.indexOf('rayos') !== -1 || s.indexOf('ecograf') !== -1) return 'Rayos X';
  return '';
}

// Solo DOS filas: el médico general atiende consulta general, controles
// generales, vacunación e inyectología. El especialista, lo suyo.
// Las filas NO llevan color: el color identifica al SERVICIO, y dentro de
// cada fila conviven varios servicios. Pintar la fila solo confundiría.
const FILAS = [
  {key:'generales',      label:'Generales'},
  {key:'especializados', label:'Especialistas'}
];

// A qué fila pertenece cada paciente.
// Va a Especialistas todo lo que solo puede resolver una persona puntual:
// si cae en Generales, aparece en la cola de médicos que no lo pueden
// atender y ensucia la fila de los que sí.
function recordFila(r) {
  const s = (r.service || '').toLowerCase();
  if (s.indexOf('especial') !== -1) return 'especializados';
  if (s.indexOf('control') !== -1 && (r.specialty || r.agendado === 'si')) return 'especializados';
  // Rayos X y ecografía los hace la Dra. Angie.
  if (s.indexOf('rayos') !== -1 || s.indexOf('ecograf') !== -1) return 'especializados';
  // Certificado de viaje: solo el Dr. Freddy.
  if (s.indexOf('viajer') !== -1) return 'especializados';
  return 'generales';   // general, control general, vacunación, inyectología
}

// Normaliza la hora de la cita venga como "10:30" o como fecha de Sheets.
function fmtHora(h) {
  if (!h) return '';
  if (typeof h === 'string' && /^\d{1,2}:\d{2}$/.test(h)) return h;
  const d = new Date(h);
  if (!isNaN(d)) return String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0');
  return String(h);
}

function horaToDate(h) {
  const s = fmtHora(h); const p = s.split(':');
  if (p.length < 2) return null;
  const d = new Date(); d.setHours(+p[0], +p[1], 0, 0); return d;
}

// ── La regla híbrida ─────────────────────────────────────────
// Inyectología es el ÚNICO servicio rápido (~3 min). Vacunación NO lo es
// (carnet, preguntas, historia si es nueva, revisión), así que va a la
// cola normal como cualquier consulta.
function esInyeccion(r) {
  return (r.service || '').toLowerCase().indexOf('inyect') !== -1;
}
function porLlegada(a, b) { return new Date(a.timestamp) - new Date(b.timestamp); }

// Orden de decisión:
//   1. Cita programada cuya hora ya llegó (o llega en ≤15 min)
//   2. Intercalado: 1 inyectología por cada 2 pacientes largos
//   3. Orden de llegada
// ── ¿Quién está por desocuparse? ─────────────────────────────
// Minutos que tiene que llevar un médico con su paciente para considerar
// que está por salir. Depende de lo que esté atendiendo: una inyección no
// dura lo que una consulta. Números dados por la clínica.
function umbralSalida(service) {
  const s = normEsp(service);
  if (s.indexOf('inyect') !== -1) return 8;
  if (s.indexOf('vacun')  !== -1) return 18;
  return 25;   // consultas, controles, especializadas, rayos X, viajero
}

// Libre ahora, o a punto de estarlo.
function estaPorSalir(medico, hoy) {
  const enConsulta = hoy.find(x => (x.estadoTurno === 'llamando' || x.estadoTurno === 'atendiendo') && x.calledBy === medico);
  if (!enConsulta) return true;                 // no está atendiendo a nadie
  if (!enConsulta.calledAt) return false;       // lo llamó sin identificarse: no sabemos
  const min = (Date.now() - new Date(enConsulta.calledAt)) / 60000;
  return min >= umbralSalida(enConsulta.service);
}

// ¿Este médico puede atender a este paciente? Espejo de medicosQueAvisar:
// por 'general' hace falta estar de turno; por una especialidad, no.
function puedeTomar(m, r) {
  const tgt = destinatarios(r);
  return m.especialidades.map(normEsp).some(function(e) {
    if (tgt.indexOf(e) === -1) return false;
    return e === 'general' ? deTurno.indexOf(m.medico) !== -1 : true;
  });
}

// ¿Hay OTRO médico que pueda tomar a este paciente ya o en pocos minutos?
// Si lo hay, yo no tengo que correr por él: va a esperar poco igual.
function otroLoPuedeTomarPronto(r, hoy) {
  return medicos.some(m => m.medico !== miMedico && puedeTomar(m, r) && estaPorSalir(m.medico, hoy));
}

// La ventana de una cita: manda desde 15 min ANTES hasta 15 min DESPUÉS de
// su hora. Fuera de eso entra por tiempo de espera, como todos.
// El "después" es lo importante: antes la condición era solo "su hora ya
// pasó", que se cumple para siempre — una cita de las 9 de la mañana
// saltaba la cola a las 5 de la tarde. Llegar 3 horas tarde no puede darte
// prioridad sobre alguien que lleva una hora sentado esperando.
const TOLERANCIA_CITA = 15;   // minutos, antes y después

function citaEnVentana(r) {
  if (r.agendado !== 'si' || !r.horaCita) return false;
  const t = horaToDate(r.horaCita);
  if (!t) return false;
  const min = (Date.now() - t.getTime()) / 60000;   // negativo = todavía no es la hora
  return min >= -TOLERANCIA_CITA && min <= TOLERANCIA_CITA;
}

// Recepción le puso "no llamar antes de las HH:MM" porque hay una cita
// antes que este paciente. Congelado hasta que esa ventana se cierre,
// aunque haya llegado primero: su espera no le gana a una cita.
function estaCongelado(r) {
  if (!r.esperarHasta) return false;
  const t = horaToDate(r.esperarHasta);
  return !!t && Date.now() < t.getTime();
}

function pickNext(list, filaKey, yaLlamados) {
  // Los congelados no se pueden llamar todavía.
  list = list.filter(r => !estaCongelado(r));
  if (!list.length) return null;

  // 1. Las citas mandan dentro de su ventana
  const prog = list.filter(citaEnVentana)
    .map(r => ({ r: r, t: horaToDate(r.horaCita) }))
    .sort((a,b) => a.t - b.t);
  if (prog.length) return prog[0].r;

  // 2. Intercalado (solo en Generales, que es donde conviven los dos tipos).
  //    Mantiene la proporción 1 inyectología cada 2 largos: así las
  //    inyecciones no esperan 80 min, y las consultas NUNCA se quedan
  //    varadas aunque lleguen inyecciones sin parar.
  if (filaKey === 'generales' && yaLlamados) {
    const inyEsperando = list.filter(esInyeccion).sort(porLlegada);
    if (inyEsperando.length) {
      const inyLlamadas   = yaLlamados.filter(esInyeccion).length;
      const largosLlamados = yaLlamados.length - inyLlamadas;
      if (inyLlamadas < Math.floor(largosLlamados / 2)) return inyEsperando[0];
    }
  }

  // 3. El que más lleva esperando
  return list.slice().sort(porLlegada)[0];
}

function setView(v) {
  activeView = v;
  ['sala','pending','reviewed'].forEach(id =>
    document.getElementById('f-'+id).classList.toggle('active', id === v));
  document.getElementById('dateFilter').style.display = (v === 'reviewed') ? 'block' : 'none';
  renderAll();
}

function isSameDay(ts, ref) {
  const d = new Date(ts);
  return !isNaN(d) && d.toDateString() === ref.toDateString();
}

// Filas plegadas — se recuerda por médico (queda guardado en el navegador),
// así el especialista deja colapsadas las que no le tocan.
let collapsed = {};
try { collapsed = JSON.parse(localStorage.getItem('ac_filas_col') || '{}'); } catch (e) { collapsed = {}; }

function toggleFila(key) {
  collapsed[key] = !collapsed[key];
  try { localStorage.setItem('ac_filas_col', JSON.stringify(collapsed)); } catch (e) {}
  renderSala();
}

// ── Identidad del médico ─────────────────────────────────────
// El directorio vive en la pestaña "Medicos" de la hoja: la misma que
// decide a quién le llega el WhatsApp. Un médico puede cubrir varias
// especialidades (Wilmer Páez hace Cardiología y Ortopedia), por eso la
// identidad es el MÉDICO y no la especialidad.
let medicos = [];
let miMedico = '';
try { miMedico = localStorage.getItem('ac_medico') || ''; } catch (e) {}

function normEsp(s) {
  return String(s || '').toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g, '').trim();
}

function misEspecialidades() {
  const m = medicos.find(x => x.medico === miMedico);
  let esp = m ? m.especialidades.map(normEsp) : [];
  // Si recepción te puso de turno general en esta jornada, cubrís 'general'
  // aunque seas especialista puro (Wilmer/Alberto ayudando en la sala). Con
  // esto ves la fila general y te llegan sus pacientes, sin tocar la hoja.
  if (miMedico && deTurno.indexOf(miMedico) !== -1 && esp.indexOf('general') === -1) {
    esp = esp.concat('general');
  }
  return esp;
}

// Quién debe atender este paciente. Es el MISMO criterio que usa
// getDoctorPhones en el backend para decidir a quién le vibra el celular.
// Si cambia allá, tiene que cambiar acá: el médico ve exactamente los
// pacientes por los que se le avisa, ni uno más ni uno menos.
function destinatarios(r) {
  const s = normEsp(r.service), sp = normEsp(r.specialty);
  if (s.indexOf('especial') !== -1) return [sp];
  if (s.indexOf('control')  !== -1) return sp ? [sp] : ['general'];
  if (s.indexOf('rayos') !== -1 || s.indexOf('ecograf') !== -1) return ['rayos x y ecografia'];
  if (s.indexOf('vacun') !== -1 || s.indexOf('inyect') !== -1) return ['vacunacion', 'general'];
  if (s.indexOf('viajer')   !== -1) return ['viajero'];
  return ['general'];
}

function atiendo(r) {
  const mis = misEspecialidades();
  if (!mis.length) return true;            // sin identidad, ve todo
  return destinatarios(r).some(t => t && mis.indexOf(t) !== -1);
}

// Qué filas puede llegar a tener este médico. Tiene que coincidir con
// recordFila: si una manda el certificado de viaje a Especialistas y la
// otra cree que es de Generales, Freddy no lo ve en ninguna.
// Freddy hace Nutrición y Viajero (especialistas) Y General: ve las dos.
function misFilas() {
  const mis = misEspecialidades();
  if (!mis.length) return FILAS.map(f => f.key);
  const set = {};
  mis.forEach(function(e){
    if (e === 'general' || e === 'vacunacion') set.generales = 1;
    else set.especializados = 1;   // incluye viajero, rayos x y las demás
  });
  return FILAS.map(f => f.key).filter(k => set[k]);
}

function setMiMedico(v) {
  miMedico = v;
  try { localStorage.setItem('ac_medico', v); } catch (e) {}
  pintarMedicoChip();
  renderSala();
  updateCounts();
}

// ── Identidad del médico (chip del header) ───────────────────
// Verde = está recibiendo notificaciones. Un especialista (tenga o no
// también 'general') siempre recibe sus citas, así que va verde siempre.
// Un general puro solo va verde si recepción lo puso de turno.
function esActivo() {
  if (!miMedico) return false;
  const m = medicos.find(x => x.medico === miMedico);
  const raw = m ? m.especialidades.map(normEsp) : [];
  const esEspecialista = raw.some(e => e && e !== 'general');
  const enTurno = deTurno.indexOf(miMedico) !== -1;
  return esEspecialista || enTurno;
}

function pintarMedicoChip() {
  const c = document.getElementById('medicoChip');
  if (!c) return;
  const activo = esActivo();
  c.className = 'medico-chip' + (activo ? ' activo' : '');
  c.innerHTML = '<span class="mc-dot"></span><span class="mc-name">' +
    esc(miMedico || 'Elige tu nombre') + '</span>';
}

function abrirIdentidad() {
  const cont = document.getElementById('identLista');
  cont.innerHTML =
    '<div class="idm-op idm-todos'+(miMedico?'':' sel')+'" onclick="elegirIdentidad(\'\')">👁 Ver todo sin identificarme</div>' +
    medicos.map(function(m){
      const sel = m.medico === miMedico ? ' sel' : '';
      const arg = "'" + String(m.medico).replace(/\\/g,'\\\\').replace(/'/g,"\\'") + "'";
      return '<div class="idm-op'+sel+'" onclick="elegirIdentidad('+arg+')">'+
        '<span class="idm-op-n">'+esc(m.medico)+'</span>'+
        '<span class="idm-op-e">'+esc(m.especialidades.join(', '))+'</span></div>';
    }).join('');
  document.getElementById('identModal').style.display = 'flex';
}

function cerrarIdentidad() {
  document.getElementById('identModal').style.display = 'none';
}

function elegirIdentidad(v) {
  setMiMedico(v);
  cerrarIdentidad();
  if (v) showToast('Abriste como ' + v.replace(/^Dra?\.\s*/, ''));
}

// ── Turno ────────────────────────────────────────────────────
// Quién cubre consulta general en esta jornada. YA NO lo marca el médico:
// lo define recepción desde su pantalla (pop-up de médicos de turno). Acá
// solo se lee, para saber si a este médico le toca ver la sala general.
let deTurno = [];

// Refresco optimista: los pedidos que salieron ANTES del último cambio
// traen un estado viejo. Se conserva por si el dato de turno llega tarde.
let turnoTocadoEn = 0;
function aplicaEsteTurno(pedidoEn) { return pedidoEn > turnoTocadoEn; }

// La lista de médicos casi nunca cambia, y pedirla tarda ~2s. La guardamos
// en el celular para que la puerta sea usable de inmediato. Igual se pide
// siempre por detrás: si cambió, se corrige sola en la misma carga.
// OJO: el TURNO no se cachea — ese cambia todo el día.
function medicosDelCache() {
  try {
    const c = JSON.parse(localStorage.getItem('ac_medicos') || 'null');
    if (Array.isArray(c) && c.length) medicos = c;
  } catch (e) {}
}

function cargarMedicos() {
  const pedidoEn = Date.now();
  return fetch(API_URL + '?action=medicos')
    .then(r => r.json())
    .then(function(res){
      if (!res || !res.ok) return;
      medicos = res.medicos || [];
      try { localStorage.setItem('ac_medicos', JSON.stringify(medicos)); } catch (e) {}
      // El turno viene con los médicos: con esto ya podemos preguntarle
      // quién es sin esperar la lista de pacientes.
      if (aplicaEsteTurno(pedidoEn)) deTurno = res.deTurno || [];
      document.getElementById('pruebaAviso').style.display = res.modoPrueba ? '' : 'none';
      pintarMedicoChip();   // el color depende del turno, que llega acá
    })
    .catch(function(){});
}

// Si entró desde el WhatsApp (…?t=E-04) ya sabemos por qué paciente le
// avisamos, y por lo tanto quién es. Solo lo damos por hecho cuando hay
// UN único médico posible: "general" lo cubren varios, ahí que elija.
function deducirMedico() {
  if (miMedico) return;
  let t = null;
  try { t = new URLSearchParams(location.search).get('t'); } catch (e) {}
  if (!t) return;
  const rec = allRecords.find(x => String(x.turno||'').toUpperCase() === String(t).toUpperCase());
  if (!rec) return;
  const tgt = destinatarios(rec);
  const cand = medicos.filter(m => m.especialidades.map(normEsp).some(e => tgt.indexOf(e) !== -1));
  if (cand.length === 1) {
    setMiMedico(cand[0].medico);
    showToast('Abriste como ' + cand[0].medico);
  }
}


// ── ¿Cuál de las dos filas primero? ──────────────────────────
// Solo aplica al médico que atiende las dos (Tatiana es gastro y general).
//
// LA REGLA, en palabras de la clínica: llama al que más tiempo lleva
// esperando. Excepción: si a ese lo va a poder tomar otro médico en pocos
// minutos, salta al que solo tú puedes atender.
//
// El criterio es el TIEMPO DE ESPERA DEL PACIENTE, no la categoría. Que un
// paciente sea "solo tuyo" no le da prioridad por sí solo: solo importa
// cuando cambia cuánto va a esperar alguien. Si la otra doctora acaba de
// entrar a consulta, la general se queda 30 minutos varada y hay que
// tomarla. Si está por salir, la va a tomar ella y puedes ir a lo tuyo.
function decidirEntreFilas(hoy, filasVisibles) {
  // Sin identidad no hay a quién aconsejar: "otro médico está por
  // desocuparse" no significa nada si no sabemos quién eres.
  if (!miMedico) return null;
  if (filasVisibles.length < 2) return null;   // una sola fila: no hay nada que decidir

  const cands = filasVisibles.map(function(f) {
    const mine = hoy.filter(r => recordFila(r) === f.key);
    const esp  = mine.filter(r => (r.estadoTurno || 'esperando') === 'esperando');
    const ya   = mine.filter(r => r.estadoTurno === 'llamando' || r.estadoTurno === 'atendiendo' || r.estadoTurno === 'atendido');
    return pickNext(esp, f.key, ya);
  }).filter(Boolean);

  if (cands.length < 2) return cands[0] || null;

  cands.sort(porLlegada);
  const masViejo = cands[0], elOtro = cands[1];

  // Al que más espera lo toma otro en breve → ve al que solo puedes tú.
  if (otroLoPuedeTomarPronto(masViejo, hoy) && !otroLoPuedeTomarPronto(elOtro, hoy)) {
    return elOtro;
  }
  return masViejo;
}

// ── Render de la sala de espera ──────────────────────────────
function renderSala() {
  const today = new Date();
  // Solo los pacientes que le corresponden a este médico.
  const hoy = allRecords.filter(r => isSameDay(r.timestamp, today) && atiendo(r));

  const verFilas = misFilas();
  const filasVisibles = FILAS.filter(f => verFilas.indexOf(f.key) !== -1);

  // Acá había un aviso de "fuera de turno: no te llegan avisos". Se quitó:
  // el turno lo maneja recepción ahora. El chip del header (verde/gris) ya
  // le dice al médico si está recibiendo notificaciones o solo mirando.

  // Awareness read-only: quién está siendo atendido ahora en toda la clínica.
  // Excluye a mi propio paciente (ese ya lo veo en su tarjeta con botones).
  const enConsulta = allRecords.filter(r => isSameDay(r.timestamp, today) &&
    r.estadoTurno === 'atendiendo' && (!miMedico || r.calledBy !== miMedico));
  let stripHtml = '';
  if (enConsulta.length) {
    enConsulta.sort((a,b) => new Date(a.calledAt||a.timestamp) - new Date(b.calledAt||b.timestamp));
    stripHtml = '<div class="consulta-strip"><div class="cs-t">🩺 En consulta ahora · '+enConsulta.length+'</div>'+
      enConsulta.map(r => '<div class="cs-item">'+
        '<span class="cs-turno" style="color:'+serviceColor(r.service)+'">'+esc(r.turno||'')+'</span>'+
        '<span class="cs-pet">'+esc(r.petName||'')+'</span>'+
        (r.medicoAsignado ? '<span class="cs-med">'+esc(r.medicoAsignado)+(r.consultorio?' · '+esc(r.consultorio):'')+'</span>' : '')+
      '</div>').join('')+
    '</div>';
  }

  let html = stripHtml + '<div class="filas' + (filasVisibles.length === 1 ? ' una' : '') + '">';

  // Cuando un médico tiene las dos filas (Tatiana es gastro Y general),
  // hay que decirle cuál llamar primero. Ver decidirEntreFilas.
  const recomendado = decidirEntreFilas(hoy, filasVisibles);

  // ¿Dejé un paciente sin cerrar? Entonces no puedo llamar a otro: primero
  // cierro el que tengo. Esto le pone el freno SOLO a quien lo llamó — el
  // compañero de turno puede seguir llamando sin problema.
  // De paso arregla el olvido de marcar "Atendido": el sistema cree ocupado
  // al que no cierra, y entonces deja de avisarle. Ahora no puede seguir
  // sin cerrar, así que el olvido se nota en el acto.
  // Solo un paciente 'llamando' (llamado, sin decidir) frena el llamado del
  // siguiente. Apenas el médico marca "Atender" pasa a 'atendiendo' y se
  // libera: puede llamar al que sigue mientras atiende a este.
  const miPacienteAbierto = miMedico
    ? hoy.find(r => r.estadoTurno === 'llamando' && r.calledBy === miMedico)
    : null;

  filasVisibles.forEach(function(f) {
    const mine     = hoy.filter(r => recordFila(r) === f.key);
    // 'llenando' (haciendo su registro) entra a la MISMA cola que los demás:
    // el médico lo llama cuando le toca, con registro o sin él. La etiqueta
    // de la tarjeta le dice si el registro está listo (ver etiquetaRegistro).
    const enEspera = e => e === 'esperando' || e === 'llenando' || !e;
    const esperando= mine.filter(r => enEspera(r.estadoTurno));
    // El paciente que está atendiendo un médico es asunto suyo: al
    // compañero solo le sirve saber a quién sigue. Verlo en la pantalla de
    // otro es ruido y encima invita a pisarle el turno.
    // Si no hay identidad ("ver todos") se muestran todos, y si nadie firmó
    // el llamado tampoco lo escondemos: sería peor perderlo de vista.
    // La tarjeta de acción es SOLO para 'llamando' (recién llamado, todavía
    // sin decidir). Al marcar "Atender" pasa a 'atendiendo' y desaparece del
    // dashboard de todos — su seguimiento queda en recepción.
    const llamando = mine.filter(r => r.estadoTurno === 'llamando' &&
      (!miMedico || !r.calledBy || r.calledBy === miMedico));
    // Los que ya pasaron hoy por esta fila: sirven para mantener la
    // proporción del intercalado a lo largo del día.
    const yaLlamados = mine.filter(r => r.estadoTurno === 'llamando' || r.estadoTurno === 'atendiendo' || r.estadoTurno === 'atendido');
    const next     = pickNext(esperando, f.key, yaLlamados);

    const isCol = !!collapsed[f.key];
    let body = '';

    // Cuántos de los que esperan todavía están haciendo su registro.
    const haciendoReg = esperando.filter(r => r.estadoTurno === 'llenando').length;
    html += '<div class="fila"><div class="fila-hd" onclick="toggleFila(\''+f.key+'\')">'+
            '<span class="fila-t">'+f.label+'</span>'+
            '<span class="fila-hd-r">'+
              (llamando.length ? '<span class="fila-n">🔔 '+llamando.length+'</span>' : '')+
              '<span class="fila-n">'+esperando.length+' en espera</span>'+
              (haciendoReg ? '<span class="fila-n">✍️ '+haciendoReg+'</span>' : '')+
              '<span class="fila-cv">'+(isCol ? '▸' : '▾')+'</span>'+
            '</span></div>';

    // El paciente que estoy atendiendo. Solo lo veo yo (ver el filtro de
    // arriba), así que ya no hace falta el nombre del médico en la tarjeta.
    llamando.forEach(function(r) {
      // Ausente es la salida para el que no apareció: sin esto el médico
      // queda trabado y termina marcando "Atendido" a alguien que nunca
      // atendió, que es peor — ensucia el dato y no queda registro real.
      body += '<div class="calling"><div class="calling-top">'+
        '<div class="q-click" onclick="goToAnamnesis('+r.rowIndex+')">'+
          '<div class="calling-t">'+esc(r.turno||'')+'</div>'+
          '<div class="calling-m">'+esc(r.petName||'')+(r.consultorio?' · '+esc(r.consultorio):'')+'</div>'+
        '</div>'+
        '<div class="calling-btns">'+
          '<div class="calling-fila1">'+
            '<button class="btn-aus" onclick="markAusente('+r.rowIndex+')">Ausente</button>'+
            '<button class="btn-atender" onclick="atender('+r.rowIndex+')">✓ Atender</button>'+
          '</div>'+
          '<div class="calling-fila2">'+
            '<button class="btn-again" onclick="llamarDeNuevo('+r.rowIndex+')">🔔 Llamar otra vez</button>'+
            '<button class="btn-sutil" onclick="markAtendido('+r.rowIndex+')" title="Cerrar sin llamar al siguiente">Marcar atendido</button>'+
          '</div>'+
        '</div></div></div>';
    });

    // Siguiente a llamar — semi-desplegado, clickeable para ver la anamnesis
    if (next) {
      const nc = serviceColor(next.service);
      const hora = fmtHora(next.horaCita);
      const citaB = next.agendado === 'si' ? '<span class="mini mini-cita">Cita de las '+esc(hora)+'</span>' : '';
      const espoB = next.agendado === 'si' ? '' : '<span class="mini mini-esp">Espontáneo</span>';
      const subC  = etiquetaRegistro(next) + citaB;   // debajo del turno: registro + cita
      // Ningún consultorio queda elegido por defecto, para que el médico no
      // llame sin querer a la sala equivocada. La excepción: al especialista
      // se le preselecciona SU consultorio (el que más usa), que igual puede
      // cambiar. Sin preselección, Llamar arranca apagado hasta que elija.
      const pref = consultorioPreferido(next);
      let opts = '<option value=""'+(pref?'':' selected')+'>— Elige el consultorio —</option>';
      roomsFor(f.key).forEach(function(rm){
        opts += '<option value="'+rm+'"'+(rm===pref?' selected':'')+'>'+rm+'</option>';
      });
      // Si atiende las dos filas, le decimos cuál va primero y por qué.
      // Es una sugerencia, no una orden: el botón queda habilitado igual.
      // El médico sabe si su paciente puede esperar diez minutos.
      const esElRecomendado = recomendado && recomendado.rowIndex === next.rowIndex;
      const hayQueElegir    = !!recomendado && filasVisibles.length > 1;
      const sugerencia = !hayQueElegir ? ''
        : (esElRecomendado
            ? '<div class="sug sug-si">👉 Llama a este primero — lleva más esperando o nadie más puede tomarlo</div>'
            : '<div class="sug sug-no">Puede esperar: otro médico está por desocuparse</div>');

      // Sin rótulo "Siguiente" ni "Ver anamnesis completa": el turno grande
      // y el único botón de Llamar ya dicen cuál sigue, y que la tarjeta
      // abre la anamnesis se aprende la primera vez. Lo que no aporta,
      // estorba.
      body += '<div class="next-box'+(hayQueElegir && !esElRecomendado ? ' next-baja' : '')+'">'+
        sugerencia +
        '<div class="q-click" onclick="goToAnamnesis('+next.rowIndex+')">'+
          '<div class="next-top">'+
            '<div class="next-tp"><span class="next-turno" style="color:'+nc+'">'+esc(next.turno||'—')+'</span> '+
              '<span class="next-pet">'+esc(next.petName||'Sin nombre')+'</span></div>'+
            '<div class="next-espera-top'+claseEspera(next.timestamp)+'">Esperando '+fmtEspera(next.timestamp).replace(/^hace /,'')+'</div>'+
          '</div>'+
          (subC ? '<div class="next-sub">'+subC+'</div>' : '')+
          '<div class="next-owner">👤 '+esc(next.ownerName||'—')+'</div>'+
          '<div class="next-meta">'+esc(next.service||'')+(next.specialty?' · '+esc(next.specialty):'')+(espoB?' '+espoB:'')+'</div>'+
          (next.complaint ? '<div class="next-motivo">“'+esc(String(next.complaint).slice(0,90))+(String(next.complaint).length>90?'…':'')+'”</div>' : '')+
        '</div>'+
        // Con un paciente sin cerrar, Llamar queda apagado. No hace falta
        // explicarlo: su tarjeta está justo arriba con su propio ✓ Atendido.
        '<div class="next-ctrls">'+
          '<select id="room-'+f.key+'"'+(miPacienteAbierto?' disabled':' onchange="toggleLlamar(\''+f.key+'\')"')+'>'+opts+'</select>'+
          '<button id="call-'+f.key+'" class="btn-call'+((miPacienteAbierto||!pref)?' apagado':'')+'"'+
            (miPacienteAbierto
              ? ' disabled title="Cierra primero a '+esc(miPacienteAbierto.petName||miPacienteAbierto.turno)+'"'
              : ' style="background:'+nc+'"'+(pref?'':' disabled')+' onclick="callNext('+next.rowIndex+',\''+f.key+'\')"')+
          '>🔔 Llamar</button>'+
        '</div></div>';
    } else {
      body += '<div class="q-empty">Nadie esperando</div>';
    }

    // Resto de la cola — del más viejo (arriba) al más nuevo (abajo)
    const rest = esperando
      .filter(r => !next || r.rowIndex !== next.rowIndex)
      .sort((a,b) => new Date(a.timestamp) - new Date(b.timestamp));
    rest.forEach(function(r) {
      const rc = serviceColor(r.service);
      const hora = fmtHora(r.horaCita);
      const ag = r.agendado === 'si' ? '<span class="mini mini-cita">Cita de las '+esc(hora||'—')+'</span>' : '';
      // Congelado: hay una cita antes que él. Hay que decirlo, o el médico
      // ve a alguien esperando y no entiende por qué no puede llamarlo.
      const frio = estaCongelado(r)
        ? '<span class="mini mini-frio">⏸ hasta '+esc(fmtHora(r.esperarHasta))+'</span>' : '';
      body += '<div class="q-item q-click'+(estaCongelado(r)?' q-frio':'')+'" onclick="goToAnamnesis('+r.rowIndex+')">'+
        '<div class="q-turno" style="color:'+rc+'">'+esc(r.turno||'—')+'</div>'+
        '<div class="q-info">'+
          '<div class="q-pet">'+esc(r.petName||'')+' '+ag+frio+'</div>'+
          '<div class="q-meta">👤 '+esc(r.ownerName||'—')+' · '+esc(r.service||'')+'</div>'+
        '</div>'+
        '<div class="q-side">'+
          '<div class="q-reg">'+etiquetaRegistro(r)+'</div>'+
          '<div class="espera'+claseEspera(r.timestamp)+'">'+fmtEspera(r.timestamp)+'</div>'+
        '</div></div>';
    });

    // Si la fila está plegada, no mostramos el cuerpo (solo el encabezado).
    if (!isCol) html += '<div class="fila-bd">' + body + '</div>';
    html += '</div>';
  });

  html += '</div>';
  document.getElementById('mainCnt').innerHTML = html;
}

// Al entrar desde la notificación de WhatsApp (…/doctores/?t=E-04)
// abrimos directo la anamnesis de ESE paciente.
let linkAbierto = false;
function abrirDesdeLink() {
  if (linkAbierto) return;
  linkAbierto = true;
  var t = null;
  try { t = new URLSearchParams(location.search).get('t'); } catch (e) {}
  if (!t) return;

  // El turno del link ya sirvió para saber quién es (ver deducirMedico).
  // Acá lo dejamos en la SALA, no en la anamnesis: el médico viene a ver
  // toda su cola y a llamar al que sigue, no a leer una ficha suelta. Si
  // quiere la anamnesis, la abre desde la tarjeta.
  setView('sala');
  var rec = allRecords.find(function(x){
    return String(x.turno || '').toUpperCase() === String(t).toUpperCase();
  });
  if (rec) showToast('Llegaste por ' + rec.turno + ' · ' + (rec.petName || ''));
}

// Desde la sala de espera → abre la anamnesis de ese paciente.
function goToAnamnesis(rowIndex) {
  const rec = allRecords.find(x => x.rowIndex === rowIndex);
  setView('pending');
  setTimeout(function(){
    const el = document.getElementById('rec-' + rowIndex);
    if (el) {
      el.classList.add('open');
      // Arriba del todo, no al centro: centrar la tarjeta deja los datos
      // del paciente fuera de pantalla y obliga a subir para leerlos.
      // El descuento es por el encabezado, que es sticky y si no la tapa.
      const hdr  = document.querySelector('.hdr');
      const srch = document.querySelector('.srch');
      const tapa = (hdr ? hdr.offsetHeight : 0) + (srch ? srch.offsetHeight : 0) + 8;
      const y = el.getBoundingClientRect().top + window.pageYOffset - tapa;
      window.scrollTo({ top: Math.max(0, y), behavior:'smooth' });
      if (rec && !rec.complaint && !rec.detail)
        showToast('El cliente todavía no llenó su anamnesis');
    } else {
      showToast('No se encontró la anamnesis de ese turno');
    }
  }, 80);
}

// Habilita "Llamar" solo cuando hay consultorio elegido. Así nadie llama a
// una sala en blanco: sin sala, no se le puede avisar al cliente a dónde ir.
function toggleLlamar(filaKey) {
  var sel = document.getElementById('room-'+filaKey);
  var btn = document.getElementById('call-'+filaKey);
  if (!sel || !btn) return;
  var vacio = !sel.value;
  btn.disabled = vacio;
  btn.classList.toggle('apagado', vacio);
}

function callNext(rowIndex, filaKey) {
  const sel = document.getElementById('room-'+filaKey);
  const room = sel ? sel.value : '';
  // Sin consultorio no se llama (el botón ya debería estar apagado; esto es
  // la red por si algo se escapa).
  if (!room) { showToast('Elige el consultorio primero'); return; }
  fetch(API_URL, { method:'POST', body: JSON.stringify({ action:'updateTurno', rowIndex: rowIndex, estado: 'llamando', consultorio: room, medico: miMedico }) })
    .then(r => r.json()).then(function(res){
      if (res && res.ok) {
        const rec = allRecords.find(x => x.rowIndex === rowIndex);
        if (rec) { rec.estadoTurno = 'llamando'; rec.consultorio = room; }
        renderSala();
        showToast('🔔 Turno llamado a ' + room);
      } else showToast('❌ Error al llamar');
    }).catch(function(){ showToast('❌ Error de conexión'); });
}

// Volver a llamar al mismo turno (si el cliente no apareció).
// Actualiza la hora del llamado → vuelve a sonar y a destacarse en la TV.
function llamarDeNuevo(rowIndex) {
  const rec = allRecords.find(x => x.rowIndex === rowIndex);
  const room = rec ? (rec.consultorio || '') : '';
  fetch(API_URL, { method:'POST', body: JSON.stringify({ action:'updateTurno', rowIndex: rowIndex, estado: 'llamando', consultorio: room, medico: miMedico }) })
    .then(r => r.json()).then(function(res){
      if (res && res.ok) {
        if (rec) rec.calledAt = new Date().toISOString();
        showToast('🔔 Llamado otra vez' + (room ? ' a ' + room : ''));
      } else showToast('❌ Error al llamar');
    }).catch(function(){ showToast('❌ Error de conexión'); });
}

// No apareció. Vuelve a la cola de recepción como 'ausente' (desde ahí lo
// pueden reactivar) y libera al médico para llamar al siguiente.
// Importante que exista: si no, el médico marca "Atendido" a alguien que
// nunca vio, y ahí el dato deja de servir para nada.
function markAusente(rowIndex) {
  const rec = allRecords.find(x => x.rowIndex === rowIndex);
  if (!confirm('¿' + ((rec && rec.petName) || 'Este paciente') + ' no se presentó?')) return;
  fetch(API_URL, { method:'POST', body: JSON.stringify({ action:'updateTurno', rowIndex: rowIndex, estado: 'ausente' }) })
    .then(r => r.json()).then(function(res){
      if (res && res.ok) {
        if (rec) rec.estadoTurno = 'ausente';
        renderSala();
        updateCounts();
        showToast('Marcado como ausente · recepción puede reactivarlo');
      } else showToast('❌ Error');
    }).catch(function(){ showToast('❌ Error de conexión'); });
}

// "Atender": el paciente pasa a 'atendiendo' y su tarjeta desaparece del
// dashboard de todos. Se libera el freno y el médico puede llamar al que
// sigue. El backend, de paso, cierra a 'atendido' al anterior que este
// mismo médico estaba atendiendo (ver atenderPaciente).
function atender(rowIndex) {
  fetch(API_URL, { method:'POST', body: JSON.stringify({ action:'atender', rowIndex: rowIndex, medico: miMedico }) })
    .then(r => r.json()).then(function(res){
      if (res && res.ok) {
        const rec = allRecords.find(x => x.rowIndex === rowIndex);
        if (rec) rec.estadoTurno = 'atendiendo';
        // El anterior que yo atendía ya lo cerró el backend: lo reflejo local
        // para que la vista sea consistente hasta el próximo refresco.
        if (miMedico) allRecords.forEach(function(x){
          if (x.rowIndex !== rowIndex && x.estadoTurno === 'atendiendo' && x.calledBy === miMedico) {
            x.estadoTurno = 'atendido'; x.status = 'revisado';
          }
        });
        renderSala();
        updateCounts();
        showToast('✓ Atendiendo · turno liberado');
      } else showToast('❌ Error');
    }).catch(function(){ showToast('❌ Error de conexión'); });
}

function markAtendido(rowIndex) {
  fetch(API_URL, { method:'POST', body: JSON.stringify({ action:'updateTurno', rowIndex: rowIndex, estado: 'atendido' }) })
    .then(r => r.json()).then(function(res){
      if (res && res.ok) {
        const rec = allRecords.find(x => x.rowIndex === rowIndex);
        // Atendido cierra el caso: sale de la sala y de anamnesis,
        // y aparece en Revisadas.
        if (rec) { rec.estadoTurno = 'atendido'; rec.status = 'revisado'; }
        renderSala();
        updateCounts();
        showToast('✓ Atendido · pasó a Atendidas');
      } else showToast('❌ Error');
    }).catch(function(){ showToast('❌ Error de conexión'); });
}

function renderAll() {
  if (activeView === 'sala') { renderSala(); return; }
  const today = new Date();
  const dfVal = document.getElementById('dateFilter').value;
  let records = allRecords.filter(r => {
    const isReviewed = r.status === 'revisado';
    if (activeView === 'pending') {
      // Solo pendientes del día de hoy
      return !isReviewed && isSameDay(r.timestamp, today);
    } else {
      // Revisadas: por defecto SOLO las de hoy. Las de otros días
      // aparecen únicamente si el médico elige una fecha.
      if (!isReviewed) return false;
      if (dfVal) {
        const parts = dfVal.split('-');
        const chosen = new Date(parts[0], parts[1]-1, parts[2]);
        return isSameDay(r.timestamp, chosen);
      }
      return isSameDay(r.timestamp, today);
    }
  });

  if (!records.length) {
    const msg = activeView === 'pending'
      ? 'No hay pacientes pendientes hoy'
      : (dfVal ? 'No hay atendidos en la fecha elegida'
               : 'Nadie atendido hoy todavía · usá la fecha para ver otros días');
    document.getElementById('mainCnt').innerHTML =
      '<div class="empty"><div class="empty-icon">🐾</div><div class="empty-title">Todo al día</div><div class="empty-sub">' + msg + '</div></div>';
    return;
  }

  const groups = {};
  records.forEach(r => {
    const dt = new Date(r.timestamp);
    const key = isNaN(dt) ? 'Sin fecha' : formatDateKey(dt);
    if (!groups[key]) groups[key] = [];
    groups[key].push(r);
  });

  let html = '';
  Object.keys(groups).forEach(dateKey => {
    html += '<div class="date-group"><div class="date-lbl">' + dateKey + '</div>';
    groups[dateKey].forEach(r => { html += buildCard(r); });
    html += '</div>';
  });

  document.getElementById('mainCnt').innerHTML = html;
}

function formatDateKey(dt) {
  const days = ['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
  const months = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
  const today = new Date();
  const isToday = dt.toDateString() === today.toDateString();
  const yesterday = new Date(today); yesterday.setDate(today.getDate()-1);
  const isYest = dt.toDateString() === yesterday.toDateString();
  if (isToday) return 'Hoy · ' + dt.getDate() + ' ' + months[dt.getMonth()];
  if (isYest) return 'Ayer · ' + dt.getDate() + ' ' + months[dt.getMonth()];
  return days[dt.getDay()] + ' · ' + dt.getDate() + ' ' + months[dt.getMonth()];
}

function fmtTime(ts) {
  const dt = new Date(ts);
  if (isNaN(dt)) return '';
  return dt.getHours() + ':' + String(dt.getMinutes()).padStart(2,'0');
}

// Cuánto lleva esperando este paciente.
// La hora de llegada obliga al médico a hacer la resta en la cabeza, y con
// tres pacientes en pantalla nadie la hace. El dato que importa no es
// "llegó a las 10:15", es "lleva 40 minutos ahí sentado".
function minutosEsperando(ts) {
  const dt = new Date(ts);
  if (isNaN(dt)) return null;
  return Math.max(0, Math.floor((Date.now() - dt.getTime()) / 60000));
}

function fmtEspera(ts) {
  const m = minutosEsperando(ts);
  if (m === null) return '';
  if (m < 1)  return 'recién llegó';
  if (m < 60) return 'hace ' + m + ' min';
  const h = Math.floor(m / 60), r = m % 60;
  return 'hace ' + h + ' h' + (r ? ' ' + r + ' min' : '');
}

// A partir de media hora esperando, que se note.
function claseEspera(ts) {
  const m = minutosEsperando(ts);
  if (m === null) return '';
  if (m >= 45) return ' esp-mucho';
  if (m >= 30) return ' esp-medio';
  return '';
}

// La etiqueta de registro que el médico ve en cada tarjeta de la cola:
//   ✍️ Haciendo registro → el cliente lo está llenando en su celular
//   🚫 Sin registro      → no tiene teléfono o no va a llenarlo; se atiende así
//   (con anamnesis)       → sin etiqueta: el registro está y se lee al abrir
// Vale para las dos: el médico llama igual, la etiqueta solo lo informa.
function etiquetaRegistro(r) {
  if (r.estadoTurno === 'llenando') return '<span class="mini mini-llen">Haciendo registro</span>';
  if (!r.complaint && !r.detail)    return '<span class="mini mini-sinreg">Sin registro</span>';
  return '';
}

function serviceColor(s) {
  s = (s || '').toLowerCase();
  // Control primero: "Control especializado" tiene las dos palabras y se
  // agrupa (azul) con los controles. El ruteo (serviceFila/destinatarios)
  // sí lo manda con el especialista — eso es aparte y correcto.
  if (s.indexOf('control')  !== -1) return '#2563eb';
  if (s.indexOf('especial') !== -1) return '#f97316';
  if (s.indexOf('vacun')    !== -1) return '#8e3f9e';
  if (s.indexOf('inyect')   !== -1) return '#eab308';
  if (s.indexOf('rayos') !== -1 || s.indexOf('ecograf') !== -1) return '#be123c';
  if (s.indexOf('viajer')   !== -1) return '#0891b2';
  if (s.indexOf('general')  !== -1) return '#16a34a';
  return '#94a3b8';
}

function sClass(val, good, bad) {
  if (!val || val === '—') return '';
  const v = val.toLowerCase();
  if (v.includes(good.toLowerCase())) return ' ok';
  if (v.includes(bad.toLowerCase())) return ' bad';
  return ' warn';
}

function toggleRec(rowIdx) {
  document.getElementById('rec-' + rowIdx).classList.toggle('open');
}

// markReviewed se quitó: la anamnesis ya no se marca aparte.
// Cuando el médico marca al paciente como ATENDIDO, updateTurno pone
// status=revisado en el backend y la ficha pasa sola a Atendidas.

function copyRecord(rowIdx) {
  const r = allRecords.find(x => x.rowIndex === rowIdx);
  if (!r) return;
  const line = (label, val) => val && val !== '—' && val !== '' ? label + ': ' + val + '\n' : '';

  const text = [
    '══════════════════════════════════',
    '  ANAMNESIS PRE-CONSULTA',
    '  Animal Center',
    '══════════════════════════════════\n',
    r.vetesoftHc ? '▸ HISTORIA CLÍNICA VETESOFT: ' + r.vetesoftHc + '\n\n' : '',
    '▸ DATOS DEL PACIENTE\n',
    line('Nombre', r.petName), line('Especie', r.species), line('Raza', r.breed),
    line('Edad', r.age), line('Sexo', r.sex), line('Castrado/a', r.neutered),
    r.weight ? line('Peso', r.weight + ' kg') : '', '\n',
    '▸ PROPIETARIO\n',
    line('Nombre', r.ownerName), '\n',
    '▸ SERVICIO\n',
    line('Tipo', r.service), line('Especialidad', r.specialty), '\n',
    '▸ MOTIVO DE CONSULTA\n',
    (r.complaint||'—') + '\n\n',
    line('Inicio de síntomas', r.duration), line('Evolución', r.evolution), '\n',
    r.detail ? '▸ DETALLE DE LA CONSULTA\n' + r.detail + '\n\n' : '',
    '▸ REVISIÓN DE SÍNTOMAS\n',
    line('Apetito', r.appetite), line('Consumo de agua', r.water),
    line('Vómito', r.vomit), line('Diarrea', r.diarrhea),
    line('Energía / actitud', r.energy), line('Tos / Estornudos', r.cough),
    line('Dificultad respiratoria', r.breathing), line('Orina', r.urine),
    line('Piel / Pelo', r.skin), line('Dolor', r.pain), '\n',
    '▸ HISTORIAL MÉDICO\n',
    line('Vacunas al día', r.vaccines), line('Desparasitación', r.deworming),
    line('Medicamentos actuales', r.medications),
    line('Enfermedades / Cirugías anteriores', r.history),
    line('Alergias conocidas', r.allergies), line('Alimentación', r.diet),
    r.notes ? line('Notas adicionales', r.notes) : '', '\n',
    '══════════════════════════════════\n',
    'Registrado: ' + new Date(r.timestamp).toLocaleString('es-CO'),
    '\n══════════════════════════════════',
  ].join('');

  navigator.clipboard.writeText(text).then(function() {
    const btn = document.getElementById('copy-' + rowIdx);
    btn.classList.add('copied');
    btn.textContent = '✓ ¡Copiado!';
    setTimeout(() => { btn.classList.remove('copied'); btn.textContent = '📋 Copiar anamnesis'; }, 2500);
    showToast('📋 Anamnesis copiada al portapapeles');
  }).catch(function() {
    showToast('❌ No se pudo copiar automáticamente');
  });
}

function updateCounts() {
  const today = new Date();
  const pending = allRecords.filter(r => r.status !== 'revisado' && isSameDay(r.timestamp, today)).length;
  const el = document.getElementById('pendingCount');
  if (pending > 0) {
    el.textContent = '📋 ' + pending;
    el.title = pending + ' anamnesis pendiente' + (pending === 1 ? '' : 's') + ' hoy';
    el.classList.add('show');
  } else {
    el.classList.remove('show');
  }
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

function esc(str) {
  if (!str) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Actualización casi instantánea ───────────────────────────
// Cada 5s preguntamos SOLO un número ("¿cambió algo?"), que no lee la
// hoja y casi no consume cuota. Si cambió, ahí sí bajamos los datos.
// Así una anamnesis nueva aparece en segundos, no en un minuto.
let ultimaVersion = null;

function chequearCambios() {
  // No interrumpimos al médico si está leyendo una ficha abierta.
  if (document.querySelector('.rec.open')) return;
  fetch(API_URL + '?action=version')
    .then(function(r){ return r.json(); })
    .then(function(res){
      if (!res || !res.ok) return;
      if (ultimaVersion === null) { ultimaVersion = res.v; return; }
      if (res.v !== ultimaVersion) {
        ultimaVersion = res.v;
        loadRecords(true);          // silencioso: sin spinner
      }
    })
    .catch(function(){});
}

// Android exige un service worker para dejar instalar la app de verdad.
// El nuestro no cachea nada (ver sw.js): preferimos depender del internet
// antes que mostrarle a un médico una versión vieja del sistema.
if ('serviceWorker' in navigator) {
  window.addEventListener('load', function () {
    navigator.serviceWorker.register('/sw.js').catch(function () {});
  });
}

// Los minutos de espera corren solos aunque no llegue ningún paciente, y
// de ellos depende también a quién sugerimos llamar (un médico que estaba
// "a 10 min de salir" ya salió). Sin esto el médico ve números congelados.
setInterval(function(){
  if (activeView === 'sala') renderSala();
}, 60000);

setInterval(chequearCambios, 5000);
setInterval(function(){ if (!document.querySelector('.rec.open')) loadRecords(true); }, 120000); // red de seguridad

// ── Arranque ──
// Ya no hay puerta de "quién eres / de turno": el médico entra directo. Su
// nombre queda guardado en el dispositivo (selector de arriba), y si viene
// del WhatsApp (?t=E-04) se autoselecciona. El turno lo define recepción.
medicosDelCache();          // carga la lista cacheada, sin esperar
pintarMedicoChip();         // muestra el nombre guardado de una
recordsDelCache();          // pinta la última cola guardada AL INSTANTE
cargarMedicos();
loadRecords();              // refresca con el backend por detrás
</script>
