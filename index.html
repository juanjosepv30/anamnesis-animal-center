<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Pre-consulta — Animal Center</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#f3e7f7;--bg2:#ede9f5;
  --tx:#3a2140;--tm:#7d6d86;--ts:#b8a8c2;
  --p:#8e3f9e;--pl:#f5eefa;--pd:#6a2f78;
  --wh:#fff;--bd:#e8daf0;
  --ok:#16a34a;--okl:#f0fdf4;
}
html,body{height:100%;overflow:hidden;font-family:'Nunito',sans-serif;background:var(--bg)}
.progress-bar{position:fixed;top:0;left:0;height:3px;background:var(--p);transition:width .4s ease;z-index:100}
.progress-counter{position:fixed;top:10px;right:16px;font-size:.72rem;font-weight:700;color:var(--tm);z-index:100;letter-spacing:.3px}
.back-btn{position:fixed;top:7px;left:14px;background:none;border:none;padding:6px;cursor:pointer;color:var(--tm);font-size:1.2rem;z-index:100;border-radius:8px}
.back-btn:hover{background:rgba(0,0,0,.06)}

.screen{position:fixed;inset:0;display:flex;flex-direction:column;justify-content:center;padding:24px 24px 124px;opacity:0;transform:translateX(60px);transition:opacity .35s ease,transform .35s ease;pointer-events:none;overflow-y:auto}
.screen.active{opacity:1;transform:translateX(0);pointer-events:all}
.screen.exit-left{opacity:0;transform:translateX(-60px)}

.group-label{font-size:.65rem;font-weight:800;text-transform:uppercase;letter-spacing:1.2px;color:var(--tm);margin-bottom:10px}
.question{font-size:1.55rem;font-weight:800;color:var(--tx);line-height:1.25;margin-bottom:6px}
.question-sub{font-size:.85rem;color:var(--tm);margin-bottom:20px;line-height:1.5}

.options{display:flex;flex-direction:column;gap:10px;margin-top:18px}
.option{display:flex;align-items:center;gap:14px;background:var(--wh);border:2px solid var(--bd);border-radius:14px;padding:14px 18px;cursor:pointer;transition:all .15s;font-size:.95rem;font-weight:600;color:var(--tx)}
.option:hover{border-color:var(--p);background:var(--pl)}
.option.sel{border-color:var(--p);background:var(--pl);color:var(--p)}
.option .check{width:22px;height:22px;border-radius:50%;border:2px solid var(--bd);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:.7rem;transition:all .15s}
.option.sel .check{background:var(--p);border-color:var(--p);color:#fff}

.options-2col{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:18px}
.options-2col .option{flex-direction:column;text-align:center;padding:16px 10px;gap:6px;font-size:.85rem}
.options-2col .option .emoji{font-size:1.5rem}
.options-2col .option .check{display:none}

.text-wrap{margin-top:18px}
.text-input{width:100%;border:2px solid var(--bd);border-radius:14px;padding:16px 18px;font-size:1.05rem;font-family:'Nunito',sans-serif;color:var(--tx);outline:none;background:var(--wh);transition:border .2s}
.text-input:focus{border-color:var(--p)}
textarea.text-input{resize:none;min-height:120px;line-height:1.6}

.weight-hint{display:flex;align-items:center;gap:10px;background:var(--pl);border-radius:12px;padding:12px 14px;margin-top:16px;font-size:.82rem;color:var(--pd);font-weight:600;line-height:1.4}
.weight-hint .em{font-size:1.4rem}
.weight-input-row{display:flex;align-items:center;gap:10px;margin-top:14px}
.weight-input-row input{flex:1}
.weight-unit{font-size:1.1rem;font-weight:800;color:var(--tm)}

.multi-inputs{display:flex;flex-direction:column;gap:12px;margin-top:18px}
.input-label{font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--tm);margin-bottom:4px}

.next-btn{position:fixed;bottom:56px;left:24px;right:24px;padding:16px;background:var(--p);color:#fff;border:none;border-radius:14px;font-size:1rem;font-weight:800;font-family:'Nunito',sans-serif;cursor:pointer;transition:background .2s}
.next-btn:hover{background:var(--pd)}
.skip-link{position:fixed;bottom:14px;left:0;right:0;text-align:center;padding:8px;font-size:.82rem;color:var(--ts);cursor:pointer;font-weight:700}
.skip-link:hover{color:var(--tm)}

/* Specialty picker */
.spec-grid{display:flex;flex-direction:column;gap:7px;margin-top:12px}
.spec-card{background:var(--wh);border:2px solid var(--bd);border-radius:12px;padding:7px 11px;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:11px}
.spec-card:hover{border-color:var(--p);background:var(--pl)}
.spec-info{flex:1;min-width:0}
.spec-name{font-size:.9rem;font-weight:800;color:var(--tx);line-height:1.2}
.spec-doc{font-size:.72rem;color:var(--tm);font-weight:600;line-height:1.2;margin-top:1px}
.spec-avatar{width:42px;height:42px;border-radius:50%;position:relative;overflow:hidden;background:var(--p);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.spec-avatar img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.spec-initials{color:#fff;font-weight:800;font-size:.9rem}

/* Vetesoft lookup screen */
.vs-wrap{padding:24px 24px 40px}
.vs-loading{text-align:center;padding:30px 0}
.vs-loading .spinner{width:48px;height:48px;border:3px solid var(--bd);border-top-color:var(--p);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}
.vs-loading p{color:var(--tm);font-size:.9rem;font-weight:600}
.vs-results-list{display:flex;flex-direction:column;gap:8px;margin-bottom:12px;max-height:45vh;overflow-y:auto}
.vs-item{background:var(--wh);border:2px solid var(--bd);border-radius:12px;padding:13px 15px;cursor:pointer;transition:all .15s}
.vs-item:hover{border-color:var(--p);background:var(--pl)}
.vs-item-name{font-weight:800;font-size:.95rem;color:var(--tx);display:flex;align-items:center;gap:7px;flex-wrap:wrap}
.vs-hc{background:var(--p);color:#fff;border-radius:99px;padding:2px 9px;font-size:.65rem;font-weight:800}
.vs-item-meta{font-size:.74rem;color:var(--tm);margin-top:3px}
.vs-confirmed{background:var(--okl);border:2px solid #86efac;border-radius:12px;padding:14px 16px;display:flex;align-items:center;gap:12px}
.vs-confirmed-icon{font-size:1.8rem}
.vs-confirmed-text .name{font-weight:800;color:#15803d;font-size:.95rem}
.vs-confirmed-text .meta{font-size:.74rem;color:var(--tm);margin-top:2px}
.vs-no-match{background:#fff8e1;border:2px solid #fde68a;border-radius:12px;padding:14px 16px;text-align:center}
.vs-no-match .em{font-size:2rem;margin-bottom:8px}
.vs-no-match .title{font-weight:800;color:#92400e;font-size:.95rem;margin-bottom:4px}
.vs-no-match .sub{font-size:.78rem;color:#b45309;line-height:1.5}
.vs-no-match-continue{width:100%;margin-top:12px;padding:13px;background:#f59e0b;color:#fff;border:none;border-radius:10px;font-size:.88rem;font-weight:800;cursor:pointer;font-family:'Nunito',sans-serif}
.vs-title{font-size:1.2rem;font-weight:800;color:var(--tx);margin-bottom:5px}
.vs-sub{font-size:.82rem;color:var(--tm);margin-bottom:14px;line-height:1.5}
.vs-not-mine{font-size:.74rem;color:var(--ts);text-align:center;margin-top:8px;cursor:pointer;text-decoration:underline}

/* Start */
.start-screen{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 28px;text-align:center;background:linear-gradient(160deg,var(--bg) 0%,var(--bg2) 100%)}
.start-logo{font-size:3rem;margin-bottom:12px}
.start-h1{font-size:2rem;font-weight:900;color:var(--tx);line-height:1.15;margin-bottom:10px}
.start-h1 span{color:var(--p)}
.start-sub{font-size:.88rem;color:var(--tm);line-height:1.6;max-width:320px;margin-bottom:32px}
.start-meta{font-size:.78rem;color:var(--ts);margin-bottom:28px}
.start-btn{width:100%;max-width:320px;padding:16px;background:var(--p);color:#fff;border:none;border-radius:14px;font-size:1.05rem;font-weight:800;font-family:'Nunito',sans-serif;cursor:pointer}
.start-btn:hover{background:var(--pd)}
.start-logo-img{max-width:250px;max-height:130px;object-fit:contain;margin-bottom:22px}

/* Illustration per screen */
.illo{width:100%;max-width:260px;margin:0 auto 6px;display:flex;align-items:center;justify-content:center}
.illo svg{width:100%;height:auto;max-height:34vh}
.illo svg .st{fill:none;stroke:var(--p);stroke-width:5;stroke-linecap:round;stroke-linejoin:round}
.illo svg .fillp{fill:var(--p)}
.illo svg .fillbg{fill:var(--wh)}
.screen.has-illo{justify-content:flex-start;padding-top:8vh}
.screen.top{justify-content:flex-start;padding-top:4vh;padding-bottom:110px}

/* Success */
.success-screen{position:fixed;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;padding:32px 28px;text-align:center;background:linear-gradient(160deg,var(--bg) 0%,var(--bg2) 100%)}
.success-screen.show{display:flex}
.success-em{font-size:4rem;margin-bottom:14px}
.success-h{font-size:1.4rem;font-weight:800;color:var(--ok);margin-bottom:8px}
.success-p{font-size:.85rem;color:var(--tm);line-height:1.6;max-width:300px}
.turno-box{background:var(--p);border-radius:18px;padding:18px 32px;margin:20px 0 8px;text-align:center;box-shadow:0 8px 24px rgba(142,63,158,.3)}
.turno-label{font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:#f0d9f7}
.turno-val{font-size:3rem;font-weight:900;color:#fff;line-height:1.1;letter-spacing:1px}
.success-hc{background:var(--pl);border:2px solid #d8b4fe;border-radius:12px;padding:14px 18px;margin:20px 0;text-align:left;width:100%;max-width:320px}
.success-hc-label{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--p);margin-bottom:4px}
.success-hc-val{font-size:1.1rem;font-weight:800;color:var(--pd)}

</head>

function getIllo(key) {
  var isCat = (F.species === 'Felino');
  if (key === 'scale')  return isCat ? ILLOS.scale_cat : ILLOS.scale_dog;
  if (key === 'animal') return isCat ? ILLOS.cat : ILLOS.dog;
  return ILLOS[key] || '';
}

  {id:'sp_onc_2', group:'ONCOLOGÍA', q:'¿Dónde está ubicada?', type:'text', onlyServices:['Consulta especializada'], onlySpecialty:'Oncología', branch:true, label:'Ubicación', placeholder:'Ej: costado izquierdo, mama, cuello', skippable:true},
  {id:'sp_onc_3', group:'ONCOLOGÍA', q:'¿Ha crecido rápido en el último tiempo?', type:'single', onlyServices:['Consulta especializada'], onlySpecialty:'Oncología', branch:true, label:'Crecimiento', options:[
    {label:'Sí, rápido', value:'Rápido'}, {label:'Lento', value:'Lento'}, {label:'No cambió', value:'Sin cambio'}, {label:'No sé', value:'No se'}
  ]},
  {id:'sp_onc_4', group:'ONCOLOGÍA', q:'¿Notás pérdida de peso o apetito?', type:'single', onlyServices:['Consulta especializada'], onlySpecialty:'Oncología', branch:true, label:'Pérdida de peso/apetito', options:[
    {label:'No', value:'No'}, {label:'Sí', value:'Si'}
  ]},
  {id:'sp_onc_5', group:'ONCOLOGÍA', q:'¿La masa ha tenido algún flujo?', type:'single', onlyServices:['Consulta especializada'], onlySpecialty:'Oncología', branch:true, label:'Flujo de la masa', options:[
    {label:'No', value:'No'}, {label:'Sangre', value:'Sangre'}, {label:'Exudado', value:'Exudado'}, {label:'Pus', value:'Pus'}
  ]},
  {id:'sp_onc_6', group:'ONCOLOGÍA', q:'¿Se la lame o crees que le genera dolor?', type:'single', onlyServices:['Consulta especializada'], onlySpecialty:'Oncología', branch:true, label:'Lamido / dolor', options:[
    {label:'No', value:'No'}, {label:'Se la lame', value:'Se la lame'}, {label:'Le genera dolor', value:'Le genera dolor'}, {label:'Ambos', value:'Ambos'}
  ]},

  {id:'notes', group:'NOTAS FINALES', q:'¿Algo más que deba saber el médico?', sub:'Campo opcional.', type:'textarea', placeholder:'Comportamiento inusual, viajes recientes, contacto con otros animales...', skippable:true}
];

var activeIndices = [];
var currentPos = -1;

function buildActiveIndices() {
  activeIndices = [];
  for (var i = 0; i < QUESTIONS.length; i++) {
    var q = QUESTIONS[i];
    if (q.onlyIfNotFound && vsFound) continue;
    if (q.showIf && !q.showIf()) continue;
    if (q.onlyServices && q.onlyServices.indexOf(F.service) === -1) continue;
    if (q.onlySpecialty && F.specialty !== q.onlySpecialty) continue;
    if (q.conditional) {
      var parts = q.conditional.split('===');
      if (F[parts[0]] !== parts[1]) continue;
    }
    activeIndices.push(i);
  }
}

function renderQuestion(pos) {
  buildActiveIndices();
  var idx = activeIndices[pos];
  var q = QUESTIONS[idx];
  var container = document.getElementById('screens');

  var specialTypes = ['identification', 'vetesoft'];
  var realTotal = activeIndices.filter(function(i){ return specialTypes.indexOf(QUESTIONS[i].type) === -1; }).length;
  var realPos = 0;
  for (var i = 0; i < pos; i++) {
    if (specialTypes.indexOf(QUESTIONS[activeIndices[i]].type) === -1) realPos++;
  }
  if (specialTypes.indexOf(q.type) === -1) realPos++;

  document.getElementById('progressBar').style.width = (pos / activeIndices.length) * 100 + '%';
  document.getElementById('progressCounter').textContent = realPos + ' / ' + realTotal;
  document.getElementById('progressCounter').style.display = specialTypes.indexOf(q.type) !== -1 ? 'none' : 'block';
  document.getElementById('backBtn').style.display = pos > 0 ? 'block' : 'none';

  var html;
  if (q.type === 'identification') html = buildIdentScreen();
  else if (q.type === 'vetesoft') html = buildVsScreen();
  else if (q.type === 'specialty-picker') html = buildSpecialtyScreen(q);
  else if (q.type === 'weight') html = buildWeightScreen(q, pos);
  else if (q.type === '2col') html = buildColScreen(q, pos);
  else html = buildStdScreen(q, pos);

  var newEl = document.createElement('div'); newEl.innerHTML = html;
  var newScreen = newEl.firstChild;
  var existing = container.querySelector('.screen.active');
  if (existing) { existing.classList.add('exit-left'); setTimeout(function(){ if (existing.parentNode) existing.parentNode.removeChild(existing); }, 350); }
  newScreen.classList.add('active');
  container.appendChild(newScreen);
  var inp = newScreen.querySelector('input:not([type=hidden]), textarea');
  if (inp) setTimeout(function(){ inp.focus(); }, 400);
}

function buildIdentScreen() {
  return '<div class="screen">' +
    '<div class="group-label">IDENTIFIQUÉMONOS</div>' +
    '<div class="question">¿Quiénes vienen hoy?</div>' +
    '<div class="question-sub">Con estos datos buscamos tu historia clínica en el sistema.</div>' +
    '<div class="multi-inputs">' +
      '<div><div class="input-label">Tu nombre completo</div><input class="text-input" type="text" id="inp_ownerName" value="'+escAttr(F.ownerName)+'" placeholder="Nombre y apellido"></div>' +
      '<div><div class="input-label">Nombre de tu mascota</div><input class="text-input" type="text" id="inp_petName" value="'+escAttr(F.petName)+'" placeholder="Ej: Firulais"></div>' +
      '<div><div class="input-label">Cédula del propietario <span style="font-weight:400;text-transform:none;font-size:.9em">(opcional, mejora la búsqueda)</span></div><input class="text-input" type="number" inputmode="numeric" id="inp_cedula" value="'+escAttr(F._cedula||'')+'" placeholder="Ej: 1234567890"></div>' +
    '</div>' +
    '<button class="next-btn" onclick="submitIdent()">Buscar mi historia clínica →</button>' +
  '</div>';
}

function buildVsScreen() {
  return '<div class="screen vs-wrap"><div class="group-label">BUSCANDO TU HISTORIA CLÍNICA</div><div id="vsArea"><div class="vs-loading"><div class="spinner"></div><p>Buscando en el sistema...</p></div></div></div>';
}

function buildWeightScreen(q, pos) {
  return '<div class="screen has-illo">'+illoBlock(q)+'<div class="group-label">PESO</div><div class="question">'+escHtml(q.q)+'</div>' +
    '<div class="weight-hint"><span class="em">⚖️</span><span>Por favor pesa a tu mascota en la báscula de la sala e ingresa el peso.</span></div>' +
    '<div class="weight-input-row"><input class="text-input" type="text" inputmode="decimal" id="inp_weight" value="'+escAttr(F.weight)+'" placeholder="'+escAttr(q.placeholder||'')+'" onkeydown="if(event.key===\'Enter\')nextFromText(\'weight\','+pos+')"><span class="weight-unit">kg</span></div>' +
    '<button class="next-btn" onclick="nextFromText(\'weight\','+pos+')">Siguiente →</button></div>';
}

function buildSpecialtyScreen(q) {
  var cards = '<div class="spec-grid">';
  SPECIALTIES.forEach(function(s, i) {
    cards += '<div class="spec-card" onclick="pickSpecialty('+i+')">' +
      '<div class="spec-info"><div class="spec-name">'+escHtml(s.name)+'</div><div class="spec-doc">'+escHtml(s.doctor)+'</div></div>' +
      '<div class="spec-avatar"><img src="img/'+s.slug+'.jpg" alt="" onerror="this.style.display=\'none\'"><span class="spec-initials">'+s.initials+'</span></div>' +
    '</div>';
  });
  cards += '</div>';
  return '<div class="screen top"><div class="group-label">'+escHtml(q.group)+'</div><div class="question">'+escHtml(q.q)+'</div>'+(q.sub?'<div class="question-sub">'+escHtml(q.sub)+'</div>':'')+cards+'</div>';
}

function buildStdScreen(q, pos) {
  var opts = '';
  if (q.options) {
    opts = '<div class="options">';
    q.options.forEach(function(o) {
      var sel = F[q.id] === o.value ? ' sel' : '';
      opts += '<div class="option'+sel+'" onclick="selectOption(\''+q.id+'\',\''+escAttr(o.value)+'\',this,'+pos+')"><div class="check">'+(sel ? '✓' : '')+'</div><span>'+escHtml(o.label)+'</span></div>';
    });
    opts += '</div>';
  }
  if (q.type === 'text') opts += '<div class="text-wrap"><input class="text-input" type="text" id="inp_'+q.id+'" value="'+escAttr(F[q.id]||'')+'" placeholder="'+escAttr(q.placeholder||'')+'" onkeydown="if(event.key===\'Enter\')nextFromText(\''+q.id+'\','+pos+')"></div>';
  if (q.type === 'date') opts += '<div class="text-wrap"><input class="text-input" type="date" id="inp_'+q.id+'" value="'+escAttr(F[q.id]||'')+'" min="'+todayISO()+'"></div>';
  if (q.type === 'textarea') opts += '<div class="text-wrap"><textarea class="text-input" id="inp_'+q.id+'" placeholder="'+escAttr(q.placeholder||'')+'">'+escHtml(F[q.id]||'')+'</textarea></div>';
  var showNext = (q.type === 'text' || q.type === 'date' || q.type === 'textarea');
  return '<div class="screen has-illo">'+illoBlock(q)+'<div class="group-label">'+escHtml(q.group)+'</div><div class="question">'+escHtml(q.q)+'</div>'+(q.sub?'<div class="question-sub">'+escHtml(q.sub)+'</div>':'')+opts+(showNext?'<button class="next-btn" onclick="nextFromText(\''+q.id+'\','+pos+')">Siguiente →</button>':'')+(q.skippable?'<div class="skip-link" onclick="goNext('+pos+')">Omitir →</div>':'')+'</div>';
}

function buildColScreen(q, pos) {
  var opts = '<div class="options-2col">';
  q.options.forEach(function(o) {
    var sel = F[q.id] === o.value ? ' sel' : '';
    opts += '<div class="option'+sel+'" onclick="selectOption(\''+q.id+'\',\''+escAttr(o.value)+'\',this,'+pos+')">';
    if (o.emoji) opts += '<div class="emoji">'+o.emoji+'</div>';
    opts += '<span>'+escHtml(o.label)+'</span></div>';
  });
  opts += '</div>';
  return '<div class="screen has-illo">'+illoBlock(q)+'<div class="group-label">'+escHtml(q.group)+'</div><div class="question">'+escHtml(q.q)+'</div>'+(q.sub?'<div class="question-sub">'+escHtml(q.sub)+'</div>':'')+opts+'</div>';
}

function submitIdent() {
  var ownerName = document.getElementById('inp_ownerName').value.trim();
  var petName   = document.getElementById('inp_petName').value.trim();
  var cedula    = document.getElementById('inp_cedula').value.trim();
  if (!ownerName || !petName) { alert('Por favor ingresa tu nombre y el de tu mascota.'); return; }
  F.ownerName = ownerName; F.petName = petName; F._cedula = cedula;
  goNext(currentPos);
}

function pickSpecialty(i) {
  var s = SPECIALTIES[i];
  F.specialty = s.name;
  F.specialtyDoctor = s.doctor;
  goNext(currentPos);
}

function startVsLookup(pos) {
  setTimeout(function() {
    var url = API_URL + '?action=search&petName=' + encodeURIComponent(F.petName) + '&ownerName=' + encodeURIComponent(F.ownerName) + '&cedula=' + encodeURIComponent(F._cedula || '');
    fetch(url).then(function(r){ return r.json(); }).then(function(res){ renderVsResults(res, pos); }).catch(function(){ renderVsError(pos); });
  }, 500);
}

function renderVsResults(res, pos) {
  var area = document.getElementById('vsArea');
  if (!area) return;
  if (!res || !res.ok || !res.results || res.results.length === 0) { renderVsNotFound(pos); return; }
  var html = '<div class="vs-title">¿Encontramos tu mascota?</div><div class="vs-sub">Selecciona tu registro o indica que no es ninguno.</div><div class="vs-results-list">';
  res.results.forEach(function(r) {
    var hc = r.registro ? '<span class="vs-hc">HC '+escHtml(r.registro)+'</span>' : '';
    html += '<div class="vs-item" onclick=\'confirmVs('+JSON.stringify(r)+','+pos+')\'><div class="vs-item-name">'+escHtml(r.petName||'')+hc+'</div><div class="vs-item-meta">'+escHtml(r.species||'')+(r.breed?' · '+escHtml(r.breed):'')+(r.owner?' | 👤 '+escHtml(r.owner):'')+'</div></div>';
  });
  html += '</div><div class="vs-not-mine" onclick="renderVsNotFound('+pos+')">No es ninguno de estos →</div>';
  area.innerHTML = html;
}

function confirmVs(r, pos) {
  vsFound = true;
  F.vetesoftId = r.id ? String(r.id) : '';
  F.vetesoftHc = r.registro || '';
  if (r.petName) F.petName = r.petName;
  if (r.species) F.species = r.species;
  if (r.breed)   F.breed   = r.breed;
  if (r.sex)     F.sex     = r.sex;
  var area = document.getElementById('vsArea');
  if (area) {
    var hcLine = r.registro ? ' · HC <strong>'+escHtml(r.registro)+'</strong>' : '';
    area.innerHTML = '<div class="vs-confirmed"><div class="vs-confirmed-icon">✅</div><div class="vs-confirmed-text"><div class="name">'+escHtml(r.petName||F.petName)+' identificado/a</div><div class="meta">'+escHtml(r.owner||F.ownerName)+hcLine+'</div></div></div>';
  }
  setTimeout(function(){ goNext(pos); }, 1200);
}

function renderVsNotFound(pos) {
  vsFound = false; F.vetesoftId = ''; F.vetesoftHc = '';
  var area = document.getElementById('vsArea');
  if (area) area.innerHTML = '<div class="vs-no-match"><div class="em">🔍</div><div class="title">Parece que no tienes historia clínica</div><div class="sub">No encontramos tu mascota en el sistema. El médico la creará en consulta.</div><button class="vs-no-match-continue" onclick="goNext('+pos+')">Continuar y completar datos →</button></div>';
}

function renderVsError(pos) {
  var area = document.getElementById('vsArea');
  if (area) area.innerHTML = '<div class="vs-no-match"><div class="em">⚠️</div><div class="title">No pudimos conectar</div><div class="sub">Problema de conexión. Puedes continuar igual.</div><button class="vs-no-match-continue" onclick="vsFound=false;goNext('+pos+')">Continuar →</button></div>';
}

function selectOption(fieldId, value, el, pos) {
  F[fieldId] = value;
  el.parentElement.querySelectorAll('.option').forEach(function(o){ o.classList.remove('sel'); if(o.querySelector('.check')) o.querySelector('.check').textContent=''; });
  el.classList.add('sel');
  if (el.querySelector('.check')) el.querySelector('.check').textContent = '✓';
  setTimeout(function(){ goNext(pos); }, 260);
}

function nextFromText(fieldId, pos) {
  var inp = document.getElementById('inp_'+fieldId);
  if (inp) F[fieldId] = inp.value.trim();
  goNext(pos);
}

function goNext(pos) {
  buildActiveIndices();
  var nextPos = pos + 1;
  if (nextPos >= activeIndices.length) { doSubmit(); return; }
  currentPos = nextPos;
  renderQuestion(nextPos);
  var nextQ = QUESTIONS[activeIndices[nextPos]];
  if (nextQ.type === 'vetesoft') startVsLookup(nextPos);
}

function goBack() {
  if (currentPos <= 0) return;
  currentPos--;
  buildActiveIndices();
  var q = QUESTIONS[activeIndices[currentPos]];
  if (q.type === 'vetesoft') { currentPos--; }
  var pos = currentPos;
  buildActiveIndices();
  var container = document.getElementById('screens');
  var existing = container.querySelector('.screen.active');
  if (existing) { existing.style.transition = 'opacity .3s,transform .3s'; existing.style.opacity = '0'; existing.style.transform = 'translateX(60px)'; setTimeout(function(){ if (existing.parentNode) existing.parentNode.removeChild(existing); }, 300); }
  var q2 = QUESTIONS[activeIndices[pos]];
  var html;
  if (q2.type === 'specialty-picker') html = buildSpecialtyScreen(q2);
  else if (q2.type === 'weight') html = buildWeightScreen(q2, pos);
  else if (q2.type === '2col') html = buildColScreen(q2, pos);
  else html = buildStdScreen(q2, pos);
  var newEl = document.createElement('div'); newEl.innerHTML = html;
  var newScreen = newEl.firstChild;
  newScreen.style.transform = 'translateX(-60px)'; newScreen.style.opacity = '0';
  container.appendChild(newScreen);
  requestAnimationFrame(function(){ requestAnimationFrame(function(){ newScreen.style.transition = 'opacity .35s,transform .35s'; newScreen.style.opacity = '1'; newScreen.style.transform = 'translateX(0)'; newScreen.classList.add('active'); });});
  document.getElementById('progressBar').style.width = (pos / activeIndices.length) * 100 + '%';
  document.getElementById('backBtn').style.display = pos > 0 ? 'block' : 'none';
}

function compileDetail() {
  var lines = [];
  if (F.service === 'Consulta especializada' && F.specialty) {
    lines.push('Especialidad: ' + F.specialty + (F.specialtyDoctor ? ' (' + F.specialtyDoctor + ')' : ''));
  }
  for (var i = 0; i < QUESTIONS.length; i++) {
    var q = QUESTIONS[i];
    if (q.branch && F[q.id]) lines.push(q.label + ': ' + F[q.id]);
  }
  return lines.join('\n');
}

function doSubmit() {
  F.detail = compileDetail();
  document.getElementById('screens').innerHTML = '<div class="screen active" style="justify-content:center;align-items:center;text-align:center"><div style="font-size:3rem;margin-bottom:16px">📤</div><div style="font-size:1.1rem;font-weight:800;color:var(--tx)">Enviando tu ficha...</div></div>';
  document.getElementById('backBtn').style.display = 'none';
  document.getElementById('progressCounter').style.display = 'none';
  fetch(API_URL, { method:'POST', body: JSON.stringify({ action:'submit', data:F }) })
    .then(function(r){ return r.json(); })
    .then(function(res){
      if (res && res.ok) {
        document.getElementById('screens').innerHTML = '';
        document.getElementById('successScreen').classList.add('show');
        if (res.turno) { document.getElementById('turnoBox').style.display = 'block'; document.getElementById('turnoVal').textContent = res.turno; }
        if (F.vetesoftHc) { document.getElementById('successHc').style.display = 'block'; document.getElementById('successHcVal').textContent = F.vetesoftHc; }
        document.getElementById('progressBar').style.display = 'none';
      } else { showSendError(); }
    }).catch(showSendError);
}

function showSendError() {
  document.getElementById('screens').innerHTML = '<div class="screen active" style="justify-content:center;align-items:center;text-align:center"><div style="font-size:2.5rem;margin-bottom:12px">⚠️</div><div style="font-size:1rem;font-weight:700;color:var(--tx);margin-bottom:16px">Hubo un error al enviar.<br>Por favor intentá de nuevo.</div><button onclick="doSubmit()" style="padding:14px 24px;background:var(--p);color:#fff;border:none;border-radius:12px;font-size:.9rem;font-weight:700;cursor:pointer;font-family:Nunito,sans-serif">Reintentar</button></div>';
}

function startForm() {
  document.getElementById('startScreen').style.display = 'none';
  buildActiveIndices(); currentPos = 0; renderQuestion(0);
}

// Fecha de hoy en formato yyyy-mm-dd (para el mínimo del selector de fecha).
function todayISO(){
  var d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}

function escHtml(s){ if(!s)return''; return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function escAttr(s){ if(!s)return''; return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;'); }
</script>
</body>
</html>
