<!-- El dashboard se mudó a /doctores. Este archivo queda como puente y no
     se puede borrar todavía:
       · los médicos que ya instalaron el ícono lo tienen apuntando acá
       · la plantilla de WhatsApp aprobada por Meta también
     El redirect conserva el ?t=E-04, que es lo que identifica al paciente
     y al médico que abre desde la notificación. Sin eso, el link del
     mensaje llegaría a la sala sin saber quién es. -->
<link rel="canonical" href="/doctores/">
<script>
  (function () {
    var q = location.search || '';
    location.replace('/doctores/' + q + location.hash);
  })();
</script>
